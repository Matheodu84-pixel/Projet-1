<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#09090b" />
<meta name="description" content="Aboard the Titanic — révision du vocabulaire anglais Year 10 : flashcards, QCM, quiz, carte mentale, anti-pièges, examen." />
<title>Aboard the Titanic · Vocabulaire Year 10</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script>
  tailwind.config = { darkMode:'class', theme:{ extend:{ fontFamily:{ sans:['Inter','ui-sans-serif','system-ui'] } } } };
</script>
<style>
  :root{
    --bg:#f4f4f5; --card:#ffffff; --bd:#e4e4e7; --bd2:#d4d4d8;
    --fg:#18181b; --mut:#71717a; --acc:#4f46e5; --acc-fg:#ffffff;
    --ok:#16a34a; --warn:#d97706; --bad:#dc2626; --soft:#f4f4f5;
  }
  html.dark{
    --bg:#09090b; --card:#161618; --bd:#27272a; --bd2:#3f3f46;
    --fg:#fafafa; --mut:#a1a1aa; --acc:#6366f1; --acc-fg:#ffffff;
    --ok:#22c55e; --warn:#f59e0b; --bad:#ef4444; --soft:#1c1c1f;
  }
  *{ -webkit-tap-highlight-color:transparent; }
  html{ scroll-behavior:smooth; }
  body{ font-family:'Inter',sans-serif; background:var(--bg); color:var(--fg); -webkit-font-smoothing:antialiased; overscroll-behavior-y:none; }
  ::-webkit-scrollbar{ width:8px;height:8px; }
  ::-webkit-scrollbar-thumb{ background:var(--bd2);border-radius:8px; }
  .card{ background:var(--card); border:1px solid var(--bd); border-radius:14px; }
  .muted{ color:var(--mut); }
  .btn{ border-radius:10px; font-weight:600; transition:.15s; display:inline-flex; align-items:center; justify-content:center; gap:8px; }
  .btn:active{ transform:scale(.97); }
  .btn-pri{ background:var(--acc); color:var(--acc-fg); }
  .btn-pri:hover{ filter:brightness(1.08); }
  .btn-sec{ background:var(--card); color:var(--fg); border:1px solid var(--bd2); }
  .btn-sec:hover{ border-color:var(--acc); color:var(--acc); }
  .input{ width:100%; background:var(--soft); border:1.5px solid var(--bd2); border-radius:10px; color:var(--fg); outline:none; transition:.15s; }
  .input:focus{ border-color:var(--acc); }
  .opt{ text-align:left; background:var(--card); border:1.5px solid var(--bd); border-radius:10px; color:var(--fg); transition:.12s; font-weight:500; }
  .opt:hover:not(:disabled){ border-color:var(--acc); }
  .opt:disabled{ cursor:default; }
  .bar{ height:6px; border-radius:99px; background:var(--bd); overflow:hidden; }
  .bar>i{ display:block; height:100%; background:var(--acc); border-radius:99px; transition:width .4s; }
  .fade{ animation:f .25s ease both; } @keyframes f{ from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
  .pop{ animation:p .2s ease both; } @keyframes p{ from{opacity:0;transform:scale(.98)} to{opacity:1;transform:none} }
  .flip{ perspective:1200px; }
  .flip-i{ transition:transform .5s cubic-bezier(.4,.1,.2,1); transform-style:preserve-3d; position:relative; }
  .flip.on .flip-i{ transform:rotateY(180deg); }
  .face{ position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden; display:flex; align-items:center; justify-content:center; border-radius:14px; }
  .back{ transform:rotateY(180deg); }
  [data-screen]{ display:none; } [data-screen].active{ display:block; }
  kbd{ background:var(--soft); border:1px solid var(--bd2); padding:1px 6px; border-radius:5px; font-size:.7rem; }
  .node{ transition:.18s; cursor:pointer; } .node:hover{ transform:scale(1.05); }
</style>
</head>
<body class="min-h-screen">

<header class="sticky top-0 z-40 border-b" style="background:var(--bg);border-color:var(--bd)">
  <div class="max-w-3xl mx-auto px-4 h-14 flex items-center gap-3">
    <button id="homeBtn" class="flex items-center gap-2.5">
      <span class="w-8 h-8 rounded-lg grid place-items-center" style="background:var(--acc);color:#fff">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 21c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/><path d="M19.38 20A11.6 11.6 0 0 0 21 14l-9-4-9 4c0 2.9.94 5.34 2.81 7.76"/><path d="M19 13V7a2 2 0 0 0-2-2H7a2 2 0 0 0-2 2v6"/><path d="M12 10v4M12 2v3"/></svg>
      </span>
      <span class="font-bold tracking-tight text-[15px]">Aboard the Titanic</span>
    </button>
    <div class="ml-auto flex items-center gap-3 text-sm">
      <span class="muted hidden sm:inline" id="streakChip">0 j</span>
      <button id="themeToggle" class="w-9 h-9 grid place-items-center rounded-lg btn-sec" aria-label="Thème">
        <svg id="iconMoon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
        <svg id="iconSun" class="hidden" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M6.3 17.7l-1.4 1.4M19.1 4.9l-1.4 1.4"/></svg>
      </button>
    </div>
  </div>
</header>

<main class="max-w-3xl mx-auto px-4 pb-24 pt-6">

<section data-screen="home" class="active">
  <div class="fade">
    <p class="text-xs font-semibold uppercase tracking-wider" style="color:var(--acc)">Anglais · Year 10</p>
    <h1 class="text-2xl sm:text-3xl font-extrabold mt-1 leading-tight">45 mots du naufrage du Titanic</h1>
    <p class="muted text-sm mt-2">Le contrôle est une grille vide à compléter sans faute. Entraîne-toi à écrire l'anglais à partir du français.</p>

    <div class="grid grid-cols-3 gap-3 mt-5">
      <div class="card p-4 text-center"><p class="text-2xl font-extrabold"><span id="statKnown">0</span><span class="muted text-sm">/45</span></p><p class="muted text-xs mt-0.5">Maîtrisés</p></div>
      <div class="card p-4 text-center"><p class="text-2xl font-extrabold" id="statStreak">0</p><p class="muted text-xs mt-0.5">Jours de suite</p></div>
      <div class="card p-4 text-center"><p class="text-2xl font-extrabold"><span id="statBest">—</span><span class="muted text-sm">/20</span></p><p class="muted text-xs mt-0.5">Meilleur examen</p></div>
    </div>

    <div class="card p-4 mt-3">
      <div class="flex justify-between text-xs muted mb-2"><span>Progression</span><span id="progLabel">0 / 45</span></div>
      <div class="bar"><i id="progBar" style="width:0%"></i></div>
    </div>

    <div id="modeGrid" class="grid sm:grid-cols-2 gap-2.5 mt-5"></div>

    <button id="resetBtn" class="mt-6 text-xs muted hover:text-red-500 transition mx-auto block">Réinitialiser ma progression</button>
  </div>
</section>

<section data-screen="synth"><div class="fade" id="synthRoot"></div></section>
<section data-screen="cards"><div class="fade" id="cardsRoot"></div></section>
<section data-screen="qcm"><div class="fade" id="qcmRoot"></div></section>
<section data-screen="free"><div class="fade" id="freeRoot"></div></section>
<section data-screen="map"><div class="fade" id="mapRoot"></div></section>
<section data-screen="tricks"><div class="fade" id="tricksRoot"></div></section>
<section data-screen="exam"><div class="fade" id="examRoot"></div></section>

</main>

<div id="popup" class="fixed inset-0 z-50 hidden items-center justify-center p-4" style="background:rgba(0,0,0,.5)">
  <div class="card max-w-sm w-full p-5 pop">
    <div class="flex items-start justify-between gap-3">
      <h3 id="popTitle" class="text-base font-bold" style="color:var(--acc)"></h3>
      <button onclick="closePop()" class="muted text-xl leading-none">&times;</button>
    </div>
    <p id="popBody" class="mt-1.5 text-sm muted"></p>
  </div>
</div>

<div id="toast" class="fixed bottom-20 left-1/2 -translate-x-1/2 z-50 hidden px-4 py-2 rounded-lg card text-sm font-medium pop"></div>

<script>
"use strict";
/* ═══════════ DONNÉES DU COURS (transcription fidèle) ═══════════ */
const VOCAB = [
 {en:"a passenger", fr:"un passager", lvl:1, t:"people"},
 {en:"the ocean", fr:"l'océan", lvl:1, t:"journey"},
 {en:"an arrival", fr:"une arrivée", lvl:1, t:"journey"},
 {en:"a departure", fr:"un départ", lvl:1, t:"journey"},
 {en:"a survivor", fr:"un survivant", lvl:1, t:"people"},
 {en:"a deck", fr:"un pont (du bateau)", lvl:1, t:"ship"},
 {en:"a cabin", fr:"une cabine", lvl:1, t:"ship"},
 {en:"first / second / third class", fr:"1ʳᵉ / 2ᵉ / 3ᵉ classe", lvl:1, t:"ship", note:"On dit « in first class ». Attention : third, pas tird."},
 {en:"the captain = a commander", fr:"le capitaine = le commandant", lvl:1, t:"people"},
 {en:"an iceberg", fr:"un iceberg", lvl:1, t:"disaster", note:"Même mot qu'en français mais prononcé « aïce-berg »."},
 {en:"majestic", fr:"majestueux", lvl:1, t:"adj"},
 {en:"luxurious", fr:"luxueux", lvl:1, t:"adj", note:"≠ luxury (le luxe, nom). Ici c'est l'adjectif : luxuri-ous."},
 {en:"spacious", fr:"spacieux", lvl:1, t:"adj"},
 {en:"fast", fr:"rapide", lvl:1, t:"adj"},
 {en:"(to) shout / (to) cry", fr:"crier", lvl:1, t:"actions", note:"cry = crier MAIS aussi pleurer selon le contexte."},
 {en:"the crew", fr:"l'équipage", lvl:2, t:"people", note:"Mot collectif : pas de s → the crew."},
 {en:"a lifejacket", fr:"un gilet de sauvetage", lvl:2, t:"safety", note:"life + jacket → littéralement « veste de vie »."},
 {en:"a lifebelt (UK) ≠ a lifebuoy (US)", fr:"une bouée de sauvetage", lvl:2, t:"safety", note:"PIÈGE : lifebelt = anglais britannique, lifebuoy = anglais américain. Même objet."},
 {en:"the crossing", fr:"la traversée", lvl:2, t:"journey", note:"De to cross = traverser."},
 {en:"a (cruise) ship", fr:"un navire, un bateau (de croisière)", lvl:2, t:"ship"},
 {en:"a lifeboat", fr:"un canot de sauvetage", lvl:2, t:"safety", note:"life + boat. À ne pas confondre avec lifebelt (bouée)."},
 {en:"a journey = a voyage", fr:"un trajet = un voyage", lvl:2, t:"journey"},
 {en:"a suitcase / luggage", fr:"une valise / des bagages", lvl:2, t:"safety", note:"luggage est INDÉNOMBRABLE : jamais de s, jamais « a luggage »."},
 {en:"wealthy ≠ poor", fr:"riche ≠ pauvre", lvl:2, t:"adj", note:"wealthy = riche (synonyme de rich)."},
 {en:"(to) survive a disaster", fr:"survivre à une catastrophe", lvl:2, t:"actions", note:"survive + COD direct : survive a disaster (pas de « to » après survive)."},
 {en:"(to) land = (to) disembark", fr:"débarquer", lvl:2, t:"actions"},
 {en:"(to) board = (to) embark", fr:"embarquer, monter à bord", lvl:2, t:"actions", note:"on board = à bord."},
 {en:"(to) sail", fr:"naviguer", lvl:2, t:"actions", note:"a sail = une voile (nom). to sail = naviguer."},
 {en:"(to) sink, sank, sunk", fr:"couler, sombrer", lvl:2, t:"actions", note:"VERBE IRRÉGULIER : sink – sank – sunk. The ship sank in 1912."},
 {en:"(to) escape", fr:"(s')échapper", lvl:2, t:"actions"},
 {en:"a steamer / a (steam) liner", fr:"un paquebot (à vapeur)", lvl:3, t:"ship", note:"steam = la vapeur. Un steamer = un bateau à vapeur."},
 {en:"a shipwreck", fr:"une épave / un naufrage", lvl:3, t:"disaster", note:"ship + wreck. Désigne l'épave ET l'événement du naufrage."},
 {en:"a propeller", fr:"une hélice", lvl:3, t:"ship", note:"De to propel = propulser. 2 « l » : prope-ll-er."},
 {en:"a funnel = a smoke stack", fr:"une cheminée (de bateau)", lvl:3, t:"ship", note:"Le Titanic avait 4 funnels (mais 1 était factice)."},
 {en:"a disaster", fr:"une catastrophe", lvl:3, t:"disaster"},
 {en:"a post office", fr:"un bureau de poste", lvl:3, t:"ship", note:"Oui, le Titanic avait un vrai bureau de poste à bord !"},
 {en:"a look-out", fr:"un guetteur, un veilleur (vigie)", lvl:3, t:"people", note:"De to look out = surveiller. C'est lui qui a vu l'iceberg."},
 {en:"unsinkable", fr:"insubmersible", lvl:3, t:"adj", note:"un- + sink + -able. Le Titanic était dit unsinkable… ironie tragique."},
 {en:"the maiden voyage", fr:"le voyage inaugural = la 1ʳᵉ traversée", lvl:3, t:"journey", note:"maiden = première / inaugurale. Le naufrage eut lieu DURANT le maiden voyage."},
 {en:"(to) flood", fr:"être inondé / inonder", lvl:3, t:"actions"},
 {en:"(to) perish", fr:"périr", lvl:3, t:"actions", note:"Registre soutenu = mourir dans une catastrophe."},
 {en:"(to) drown", fr:"se noyer", lvl:3, t:"actions", note:"Se prononce « draoune ». Le w est muet mais s'écrit."},
 {en:"(to) collide = (to) strike = (to) hit", fr:"heurter, percuter", lvl:3, t:"actions", note:"collide WITH : the ship collided with an iceberg."},
 {en:"(to) rescue / (to) be rescued", fr:"sauver / être sauvé", lvl:3, t:"actions", note:"voix passive : be rescued = être secouru."},
 {en:"(to) throw something overboard", fr:"jeter qqch par-dessus bord", lvl:3, t:"actions", note:"throw – threw – thrown (irrégulier). overboard = par-dessus bord."}
];

const THEMES = {
  ship:    {label:"Le navire & ses parties", icon:'<path d="M2 21c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.4 2 5 2 2.5 0 2.5-2 5-2 1.3 0 1.9.5 2.5 1"/><path d="M19.38 20A11.6 11.6 0 0 0 21 14l-9-4-9 4c0 2.9.94 5.34 2.81 7.76"/><path d="M19 13V7a2 2 0 0 0-2-2H7a2 2 0 0 0-2 2v6"/><path d="M12 10v4M12 2v3"/>'},
  people:  {label:"Les personnes à bord", icon:'<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>'},
  adj:     {label:"Décrire le Titanic", icon:'<path d="m12 2 2.4 7.4H22l-6 4.6 2.3 7.4-6.3-4.6L5.7 21.4 8 14 2 9.4h7.6z"/>'},
  journey: {label:"Le voyage", icon:'<circle cx="12" cy="12" r="10"/><path d="m16.2 7.8-2 6.3-6.4 2 2-6.3z"/>'},
  disaster:{label:"Le naufrage", icon:'<path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4M12 17h.01"/>'},
  actions: {label:"Les actions (verbes)", icon:'<path d="m13 2-3 7h6l-3 7"/><path d="M5 12h.01M19 12h.01"/>'},
  safety:  {label:"Sécurité & bagages", icon:'<path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"/>'}
};

const MODES = [
  {id:'synth', name:'Synthèse', desc:'Contexte du Titanic + vocab classé par famille.', icon:'<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>'},
  {id:'cards', name:'Flashcards', desc:'45 cartes, swipe, répétition espacée.', icon:'<rect x="3" y="5" width="14" height="14" rx="2"/><path d="M7 5V3M21 9v8a2 2 0 0 1-2 2h-2"/>'},
  {id:'qcm', name:'QCM', desc:'18 questions, difficulté croissante.', icon:'<circle cx="12" cy="12" r="10"/><path d="M9.1 9a3 3 0 0 1 5.8 1c0 2-3 3-3 3"/><path d="M12 17h.01"/>'},
  {id:'free', name:'Quiz écrit', desc:'Écris l\'anglais depuis le français.', icon:'<path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/>'},
  {id:'map', name:'Carte mentale', desc:'Les 7 familles de mots.', icon:'<circle cx="12" cy="5" r="3"/><circle cx="5" cy="19" r="3"/><circle cx="19" cy="19" r="3"/><path d="M12 8v4M9.5 16 7 17M14.5 16 17 17"/>'},
  {id:'tricks', name:'Anti-pièges', desc:'Confusions classiques + 5 mnémo.', icon:'<path d="M9 18h6M10 22h4"/><path d="M15 14c.2-1 .7-1.7 1.4-2.5A4.65 4.65 0 0 0 18 8 6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.8 1.2 1.5 1.4 2.5"/>'},
  {id:'exam', name:'Examen', desc:'Chrono, 20 questions, note sur 20.', icon:'<path d="M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20Z"/><path d="M12 6v6l4 2"/>'}
];

/* ═══════════ ÉTAT / STORAGE ═══════════ */
const KEY='titanic_voc_v1';
const todayStr = ()=> new Date().toISOString().slice(0,10);
let S = load();
function defaults(){ return { known:{}, srs:{}, streak:0, lastDay:null, sessions:0, bestExam:null, lastMode:null, theme:'dark' }; }
function load(){ try{ const d=JSON.parse(localStorage.getItem(KEY)); return d? Object.assign(defaults(),d):defaults(); }catch(e){ return defaults(); } }
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(S)); }catch(e){} }
function touchDay(){
  const t=todayStr(); if(S.lastDay===t) return;
  if(S.lastDay){ const diff=(new Date(t)-new Date(S.lastDay))/86400000; S.streak = diff===1 ? S.streak+1 : 1; } else S.streak=1;
  S.lastDay=t; S.sessions++; save();
}

/* ═══════════ HELPERS ═══════════ */
const $=s=>document.querySelector(s);
const $$=s=>[...document.querySelectorAll(s)];
function toast(m){ const e=$('#toast'); e.textContent=m; e.classList.remove('hidden'); e.classList.add('flex'); clearTimeout(e._t); e._t=setTimeout(()=>{e.classList.add('hidden');e.classList.remove('flex');},1800); }
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.random()*(i+1)|0; [a[i],a[j]]=[a[j],a[i]]; } return a; }
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function norm(s){
  return String(s).toLowerCase().replace(/\(.*?\)/g,' ').replace(/[.,;!?'’`-]/g,' ')
    .replace(/\b(to|a|an|the|s|something|sth)\b/g,' ').replace(/\s+/g,' ').trim();
}
function acceptedAnswers(en){
  let out=new Set();
  en.split(/\s*(?:\/|=|≠)\s*/).forEach(p=>{
    const n=norm(p); if(n) out.add(n);
    const w=norm(p.replace(/[()]/g,' ')); if(w) out.add(w);
  });
  return [...out].filter(Boolean);
}
function lev(a,b){
  const m=a.length,n=b.length,d=Array.from({length:m+1},(_,i)=>[i,...Array(n).fill(0)]);
  for(let j=0;j<=n;j++)d[0][j]=j;
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+(a[i-1]===b[j-1]?0:1));
  return d[m][n];
}
function checkAnswer(en,input){
  const u=norm(input); if(!u) return 'wrong';
  const acc=acceptedAnswers(en);
  if(acc.includes(u)) return 'ok';
  for(const a of acc){
    if(Math.abs(a.length-u.length)<=1 && lev(a,u)<=1) return 'ok';
    if(a.length>=3 && (u.includes(a)||a.includes(u))) return 'partial';
    if(a.length>4 && lev(a,u)<=2) return 'partial';
  }
  return 'wrong';
}

/* ═══════════ NAVIGATION ═══════════ */
function go(screen){
  $$('[data-screen]').forEach(s=>s.classList.toggle('active', s.dataset.screen===screen));
  window.scrollTo(0,0);
  if(screen!=='home'){ S.lastMode=screen; touchDay(); save(); }
  ({synth:renderSynth,cards:renderCards,qcm:renderQCM,free:renderFree,map:renderMap,tricks:renderTricks,exam:renderExam,home:renderHome}[screen]||(()=>{}))();
}
window.go=go;
$('#homeBtn').onclick=()=>go('home');

/* ═══════════ DASHBOARD ═══════════ */
function knownCount(){ return Object.values(S.known).filter(Boolean).length; }
function renderHome(){
  const k=knownCount(), pct=Math.round(k/VOCAB.length*100);
  $('#statKnown').textContent=k; $('#statStreak').textContent=S.streak;
  $('#streakChip').textContent=S.streak+' j';
  $('#statBest').textContent=S.bestExam!=null?S.bestExam:'—';
  $('#progBar').style.width=pct+'%'; $('#progLabel').textContent=k+' / '+VOCAB.length;
  $('#modeGrid').innerHTML=MODES.map(m=>`
    <button data-go="${m.id}" class="card p-4 text-left hover:border-current transition flex items-center gap-3" style="--tw-border-opacity:1">
      <span class="w-9 h-9 shrink-0 rounded-lg grid place-items-center" style="background:var(--soft);color:var(--acc)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${m.icon}</svg>
      </span>
      <span class="min-w-0">

/* ═══════════ 3 · FLASHCARDS ═══════════ */
let deck=[], di=0, dir='fr2en';
function buildDeck(){
  deck=VOCAB.map((v,i)=>({...v,i})).sort((a,b)=>{
    const sa=S.srs[a.i]??0, sb=S.srs[b.i]??0;
    return sa!==sb ? sa-sb : (S.known[a.i]?1:0)-(S.known[b.i]?1:0);
  });
}
function renderCards(){
  buildDeck(); di=0;
  $('#cardsRoot').innerHTML=`${bar('Flashcards')}
  <div class="flex items-center mb-4">
    <button id="dirBtn" class="btn btn-sec px-3 py-2 text-xs"><span id="dirLbl">FR → EN</span></button>
    <span class="ml-auto muted text-xs" id="deckPos"></span>
  </div><div id="deckArea"></div>
  <p class="text-center text-xs muted mt-4">Clique ou swipe ↔ · <kbd>←</kbd> à revoir · <kbd>→</kbd> je sais · <kbd>espace</kbd> retourner</p>`;
  $('#dirBtn').onclick=()=>{ dir=dir==='fr2en'?'en2fr':'fr2en'; $('#dirLbl').textContent=dir==='fr2en'?'FR → EN':'EN → FR'; drawCard(); };
  drawCard();
}
function drawCard(){
  const area=$('#deckArea');
  if(di>=deck.length){
    area.innerHTML=`<div class="card p-10 text-center pop">
      <p class="text-lg font-bold">Paquet terminé</p>
      <p class="muted text-sm mt-1">${knownCount()} / ${VOCAB.length} mots marqués « je sais ».</p>
      <button onclick="renderCards()" class="btn btn-pri px-5 py-2.5 text-sm mt-4">Recommencer</button></div>`;
    $('#deckPos').textContent=''; return;
  }
  const c=deck[di];
  $('#deckPos').textContent=`${di+1} / ${deck.length}`;
  const front=dir==='fr2en'?c.fr:c.en, back=dir==='fr2en'?c.en:c.fr;
  area.innerHTML=`
  <div id="card" class="flip w-full h-64 sm:h-72 cursor-pointer select-none">
    <div class="flip-i w-full h-full">
      <div class="face card p-6 text-center">
        <div>
          <span class="muted text-[11px] uppercase tracking-wider">${THEMES[c.t].label} · N${c.lvl}</span>
          <p class="mt-3 text-2xl sm:text-3xl font-bold">${esc(front)}</p>
          <p class="mt-5 muted text-xs">Toucher pour révéler</p>
        </div>
      </div>
      <div class="face back p-6 text-center" style="background:var(--acc);color:#fff">
        <div>
          <p class="text-2xl sm:text-3xl font-extrabold">${esc(back)}</p>
          ${c.note?`<p class="mt-3 text-xs opacity-90 max-w-xs mx-auto leading-relaxed">${esc(c.note)}</p>`:''}
        </div>
      </div>
    </div>
  </div>
  <div class="grid grid-cols-2 gap-3 mt-4">
    <button id="bAgain" class="btn btn-sec py-3.5"><span style="color:var(--bad)">À revoir</span></button>
    <button id="bKnow" class="btn btn-pri py-3.5">Je sais</button>
  </div>`;
  const card=$('#card');
  card.onclick=()=>card.classList.toggle('on');
  $('#bKnow').onclick=e=>{ e.stopPropagation(); rate(c,true); };
  $('#bAgain').onclick=e=>{ e.stopPropagation(); rate(c,false); };
  let sx=0,sy=0,drag=false;
  card.addEventListener('touchstart',e=>{ sx=e.touches[0].clientX; sy=e.touches[0].clientY; drag=true; },{passive:true});
  card.addEventListener('touchmove',e=>{ if(!drag)return; const dx=e.touches[0].clientX-sx; card.style.transform=`translateX(${dx}px) rotate(${dx/24}deg)`; },{passive:true});
  card.addEventListener('touchend',e=>{ if(!drag)return; drag=false; const dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy;
    card.style.transform=''; if(Math.abs(dx)>80 && Math.abs(dx)>Math.abs(dy)) rate(c,dx>0); });
}
function rate(c,known){
  S.srs[c.i]= known ? (S.srs[c.i]??0)+1 : Math.max(0,(S.srs[c.i]??0)-1);
  S.known[c.i]= known ? true : (S.srs[c.i]>=2);
  if(!known) deck.push(c);
  save(); di++; drawCard();
}
window.renderCards=renderCards;

/* ═══════════ 4 · QCM ═══════════ */
let qcmList=[], qi=0, qScore=0, qWrong=[], qErr=false;
function buildQCM(only){
  let src = only&&only.length ? only.map(i=>({v:VOCAB[i],i}))
    : [1,2,3].flatMap(l=>shuffle(VOCAB.map((v,i)=>({v,i})).filter(o=>o.v.lvl===l))).slice(0,18);
  return src.map(({v,i})=>{
    const en=Math.random()<.55;
    const correct=en?v.fr:v.en;
    const opts=shuffle([correct,...shuffle(VOCAB.filter(x=>x!==v)).slice(0,3).map(x=>en?x.fr:x.en)]);
    return {q:en?`Que signifie « ${v.en} » ?`:`« ${v.fr} » en anglais ?`,correct,opts,note:v.note,i,en:v.en,fr:v.fr};
  });
}
function renderQCM(only){
  qcmList=buildQCM(only); qi=0; qScore=0; qWrong=[]; qErr=!!(only&&only.length);
  $('#qcmRoot').innerHTML=`${bar(qErr?'QCM · mes erreurs':'QCM')}<div id="qcmBody"></div>`;
  drawQCM();
}
function drawQCM(){
  const b=$('#qcmBody');
  if(qi>=qcmList.length){
    const pct=Math.round(qScore/qcmList.length*100);
    b.innerHTML=`<div class="card p-8 text-center pop">
      <p class="text-3xl font-extrabold">${qScore} / ${qcmList.length}</p>
      <p class="muted text-sm mt-1">${pct>=85?'Prêt pour le contrôle.':pct>=60?'Bien — revois tes erreurs.':'Reprends les flashcards.'}</p>
      <div class="flex flex-wrap gap-2 justify-center mt-5">
        <button onclick="renderQCM()" class="btn btn-pri px-5 py-2.5 text-sm">Recommencer</button>
        ${qWrong.length?`<button id="redoErr" class="btn btn-sec px-5 py-2.5 text-sm">Refaire mes ${[...new Set(qWrong)].length} erreurs</button>`:''}
        <button onclick="go('home')" class="btn btn-sec px-5 py-2.5 text-sm">Accueil</button>
      </div></div>`;
    if(qWrong.length) $('#redoErr').onclick=()=>renderQCM([...new Set(qWrong)]);
    if(!qErr && qScore===qcmList.length) toast('Sans faute !');
    return;
  }
  const it=qcmList[qi];
  b.innerHTML=`
  <div class="flex items-center gap-3 mb-4"><div class="bar flex-1"><i style="width:${qi/qcmList.length*100}%"></i></div><span class="muted text-xs">${qi+1}/${qcmList.length}</span></div>
  <div class="card p-5">
    <p class="font-bold">${esc(it.q)}</p>
    <div class="grid gap-2.5 mt-4" id="opts">${it.opts.map(o=>`<button class="opt px-4 py-3.5" data-o="${esc(o)}">${esc(o)}</button>`).join('')}</div>
    <div id="qfb" class="mt-4 hidden"></div>
  </div>`;
  $$('#opts .opt').forEach(btn=>btn.onclick=()=>{
    const ok=btn.dataset.o===it.correct;
    $$('#opts .opt').forEach(x=>{ x.disabled=true;
      if(x.dataset.o===it.correct){ x.style.borderColor='var(--ok)'; x.style.color='var(--ok)'; }
      else if(x===btn){ x.style.borderColor='var(--bad)'; x.style.color='var(--bad)'; }
      else x.style.opacity='.5';
    });
    if(ok)qScore++; else qWrong.push(it.i);
    const fb=$('#qfb'); fb.classList.remove('hidden');
    fb.innerHTML=`<p class="text-sm p-3 rounded-lg" style="background:var(--soft)">
      <b style="color:${ok?'var(--ok)':'var(--bad)'}">${ok?'Correct':'Faux'}</b> — <b>${esc(it.en)}</b> = ${esc(it.fr)}.${it.note?`<br><span class="muted">${esc(it.note)}</span>`:''}</p>
      <button id="qnext" class="btn btn-pri w-full py-3 mt-3">${qi+1<qcmList.length?'Suivant':'Résultat'}</button>`;
    $('#qnext').onclick=()=>{ qi++; drawQCM(); };
  });
}
window.renderQCM=renderQCM;

  <div class="card p-7 text-center pop">
    <p class="text-lg font-bold">Contrôle blanc</p>
    <p class="muted text-sm mt-2 max-w-sm mx-auto">20 questions (QCM + écriture), 6 minutes au chrono. Note sur 20 + axes d'amélioration.</p>
    <button id="exStart" class="btn btn-pri px-6 py-3 mt-5">Commencer</button></div>`;
  $('#exStart').onclick=startExam;
}
window.renderExam=renderExam;
function startExam(){
  exQ=shuffle(VOCAB.map((v,i)=>({v,i}))).slice(0,20).map(({v},idx)=>{
    if(idx%2===0){ const en=Math.random()<.5; const correct=en?v.fr:v.en;
      return {type:'qcm',q:en?`« ${v.en} » = ?`:`« ${v.fr} » → anglais ?`,correct,opts:shuffle([correct,...shuffle(VOCAB.filter(x=>x!==v)).slice(0,3).map(x=>en?x.fr:x.en)]),v}; }
    return {type:'free',q:`Écris en anglais : « ${v.fr} »`,v};
  });
  exi=0; exScore=0; exD=[]; exLeft=360;
  $('#examRoot').innerHTML=`
  <div class="flex items-center justify-between mb-3 text-sm">
    <span class="muted">Q. <span id="exNo">1</span>/20</span>
    <span id="exClock" class="font-mono font-bold px-3 py-1.5 rounded-lg" style="background:var(--soft)">06:00</span></div>
  <div class="bar mb-4"><i id="exBar" style="width:0%"></i></div><div id="exBody"></div>`;
  exT=setInterval(()=>{ exLeft--;
    const m=String(Math.floor(exLeft/60)).padStart(2,'0'), s=String(exLeft%60).padStart(2,'0');
    const cl=$('#exClock'); if(cl){ cl.textContent=`${m}:${s}`; if(exLeft<=30) cl.style.color='var(--bad)'; }
    if(exLeft<=0){ clearInterval(exT); finishExam(); }
  },1000);
  drawExam();
}
function drawExam(){
  if(exi>=exQ.length){ clearInterval(exT); return finishExam(); }
  const no=$('#exNo'); if(no) no.textContent=exi+1;
  const bb=$('#exBar'); if(bb) bb.style.width=(exi/exQ.length*100)+'%';
  const it=exQ[exi], b=$('#exBody');
  if(it.type==='qcm'){
    b.innerHTML=`<div class="card p-5 pop"><p class="font-bold">${esc(it.q)}</p>
      <div class="grid gap-2.5 mt-4">${it.opts.map(o=>`<button class="exo opt px-4 py-3.5" data-o="${esc(o)}">${esc(o)}</button>`).join('')}</div></div>`;
    $$('.exo').forEach(x=>x.onclick=()=>{
      const ok=x.dataset.o===it.correct; if(ok)exScore++;
      exD.push({q:it.q,ok,part:false,given:x.dataset.o,want:it.correct,t:it.v.t}); exi++; drawExam();
    });
  } else {
    b.innerHTML=`<div class="card p-5 pop"><p class="font-bold">${esc(it.q)}</p>
      <input id="exIn" autocomplete="off" autocapitalize="off" spellcheck="false" class="input mt-4 px-4 py-3 text-lg" placeholder="réponse anglaise…">
      <button id="exNext" class="btn btn-pri w-full py-3 mt-3">Valider</button></div>`;
    const inp=$('#exIn'); inp.focus();
    const g=()=>{ const r=checkAnswer(it.v.en,inp.value);
      exScore += r==='ok'?1 : r==='partial'?.5:0;
      exD.push({q:it.q,ok:r==='ok',part:r==='partial',given:inp.value||'(vide)',want:it.v.en,t:it.v.t}); exi++; drawExam();
    };
    $('#exNext').onclick=g;
    inp.addEventListener('keydown',e=>{ if(e.key==='Enter') g(); });
  }
}
function finishExam(){
  clearInterval(exT);
  const note=Math.round(exScore/exQ.length*20*10)/10;
  if(S.bestExam==null || note>S.bestExam){ S.bestExam=note; save(); }
  const wrong=exD.filter(d=>!d.ok);
  const miss=[...new Set(wrong.map(w=>w.t))].map(t=>THEMES[t].label);
  const col = note>=16?'var(--ok)':note>=10?'var(--warn)':'var(--bad)';
  const men = note>=16?'Excellent':note>=12?'Bien':note>=8?'À consolider':'À retravailler';
  $('#examRoot').innerHTML=`
  <div class="card p-7 text-center pop">
    <p class="muted text-xs uppercase tracking-wider">Note finale</p>
    <p class="text-5xl font-extrabold my-2" style="color:${col}">${note}<span class="text-xl muted">/20</span></p>
    <p class="font-semibold" style="color:${col}">${men}</p>
    <p class="muted text-xs mt-2">${exD.filter(d=>d.ok).length} justes · ${exD.filter(d=>d.part).length} partiels · ${wrong.filter(d=>!d.part).length} faux · ${360-exLeft}s</p>
  </div>
  ${miss.length?`<div class="card p-4 mt-3"><p class="font-semibold text-sm" style="color:var(--warn)">Axes d'amélioration</p>
    <p class="muted text-sm mt-1">Revois en priorité : <b>${miss.join(' · ')}</b>. Refais les flashcards puis le QCM « mes erreurs ».</p></div>`
    :`<div class="card p-4 mt-3 text-center text-sm font-medium" style="color:var(--ok)">Aucune famille faible — tu es prêt !</div>`}
  <div class="card p-4 mt-3">
    <p class="font-semibold text-sm mb-2">Correction</p>
    <div class="divide-y max-h-72 overflow-y-auto" style="border-color:var(--bd)">
    ${exD.map(d=>`<div class="py-2 text-sm flex gap-2">
      <span style="color:${d.ok?'var(--ok)':d.part?'var(--warn)':'var(--bad)'}">${d.ok?'✓':d.part?'≈':'✗'}</span>
      <span><span class="muted">${esc(d.q)}</span><br>Toi : ${esc(d.given)} · Attendu : <b>${esc(d.want)}</b></span></div>`).join('')}
    </div></div>
  <div class="flex gap-2 justify-center mt-4">
    <button onclick="renderExam()" class="btn btn-pri px-6 py-3">Refaire</button>
    <button onclick="go('home')" class="btn btn-sec px-6 py-3">Accueil</button></div>`;
}

/* ═══════════ THÈME ═══════════ */
function applyTheme(){
  const dark=S.theme!=='light';
  document.documentElement.classList.toggle('dark',dark);
  $('#iconMoon').classList.toggle('hidden',!dark);
  $('#iconSun').classList.toggle('hidden',dark);
  const mt=document.querySelector('meta[name=theme-color]'); if(mt) mt.setAttribute('content',dark?'#09090b':'#f4f4f5');
}
$('#themeToggle').onclick=()=>{ S.theme=S.theme==='light'?'dark':'light'; save(); applyTheme(); };
document.addEventListener('keydown',e=>{
  if(!$('[data-screen="cards"]').classList.contains('active')) return;
  const c=deck[di]; if(!c) return;
  if(e.key==='ArrowRight') rate(c,true);
  if(e.key==='ArrowLeft') rate(c,false);
  if(e.key===' '){ e.preventDefault(); const card=$('#card'); if(card) card.classList.toggle('on'); }
});

/* ═══════════ INIT ═══════════ */
applyTheme();
renderHome();
</script>
</body>
