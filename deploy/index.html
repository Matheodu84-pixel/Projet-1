<link rel="icon" type="image/svg+xml" href="./icon.svg" />
<link rel="apple-touch-icon" href="./icon.svg" />

<meta name="mobile-web-app-capable" content="yes" />

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#f7f4ee; --paper:#ffffff; --ink:#15140f; --muted:#8b857a; --soft:#3d3a33;
    --line:#ece5d6; --line-2:#dcd3bf;
    --accent:#c54221; --accent-soft:#fbe9e2; --accent-ink:#fff;
    --ok:#2d6a4f; --ok-soft:#e1f1e7;
    --warn:#9c5a13; --warn-soft:#fbedd0;
    --bad:#9a2424; --bad-soft:#f5d6d2;
    --shadow: 0 1px 2px rgba(20,18,12,.04), 0 8px 32px -16px rgba(20,18,12,.08);
    --shadow-lift: 0 1px 2px rgba(20,18,12,.05), 0 18px 48px -22px rgba(20,18,12,.18);
  }
  [data-theme="dark"]{
    --bg:#0f0e0c; --paper:#17161300; --paper:#1a1814; --ink:#f0ece3; --muted:#8c877a; --soft:#d3cebf;
    --line:#27241e; --line-2:#3a3530;
    --accent:#ff7a4d; --accent-soft:#3a201a; --accent-ink:#0f0e0c;
    --ok:#65c894; --ok-soft:#1d2c25;
    --warn:#e6b558; --warn-soft:#2e2719;
    --bad:#e6766b; --bad-soft:#2e1d1c;
    --shadow: 0 1px 2px rgba(0,0,0,.4), 0 8px 32px -16px rgba(0,0,0,.4);
    --shadow-lift: 0 1px 2px rgba(0,0,0,.5), 0 18px 48px -22px rgba(0,0,0,.6);
  }
  *{ -webkit-tap-highlight-color: transparent; box-sizing:border-box; }
  html,body{ background:var(--bg); color:var(--ink); font-family:"Inter", ui-sans-serif, system-ui, -apple-system, sans-serif; font-feature-settings: "ss01","cv11"; }
  html{ scroll-behavior:smooth; }
  body{ min-height:100vh; -webkit-font-smoothing:antialiased; }
  .serif{ font-family:"Fraunces", ui-serif, Georgia, serif; font-feature-settings: "ss01"; letter-spacing:-.015em; font-variation-settings: "opsz" 144; }
  .ink{ color:var(--ink); }
  .muted{ color:var(--muted); }
  .soft{ color:var(--soft); }
  .paper{ background:var(--paper); border:1px solid var(--line); }
  .paper-lift{ background:var(--paper); border:1px solid var(--line); box-shadow:var(--shadow); }
  .line{ border-color:var(--line); }
  .btn{ min-height:48px; padding:12px 22px; border-radius:12px; display:inline-flex; align-items:center; justify-content:center; gap:8px; font-weight:600; border:1px solid var(--line-2); background:var(--paper); color:var(--ink); transition: all .18s cubic-bezier(.2,.7,.2,1); cursor:pointer; font-size:14.5px; letter-spacing:-.005em; }
  .btn:hover{ border-color:var(--ink); transform: translateY(-1px); }
  .btn:active{ transform: translateY(0) scale(.985); }
  .btn-primary{ background:var(--ink); color:var(--bg); border-color:var(--ink); }
  .btn-primary:hover{ background:var(--accent); border-color:var(--accent); color:var(--accent-ink); box-shadow: 0 8px 24px -10px var(--accent); }
  .btn-accent{ background:var(--accent); color:var(--accent-ink); border-color:var(--accent); }
  .btn-ghost{ background:transparent; border-color:transparent; }
  .btn-ghost:hover{ background: color-mix(in oklab, var(--ink) 6%, transparent); border-color:transparent; transform:none; }
  .chip{ display:inline-flex; align-items:center; gap:6px; padding:6px 11px; border-radius:999px; font-size:11.5px; border:1px solid var(--line-2); background:var(--paper); color:var(--soft); font-weight:500; letter-spacing:.01em; }
  .chip-accent{ background:var(--accent-soft); border-color:transparent; color:var(--accent); }
  .chip-ok{ background:var(--ok-soft); border-color:transparent; color:var(--ok); }
  .chip-warn{ background:var(--warn-soft); border-color:transparent; color:var(--warn); }
  .chip-bad{ background:var(--bad-soft); border-color:transparent; color:var(--bad); }
  .kbd{ font-family: ui-monospace, monospace; font-size:11px; padding:2px 7px; border:1px solid var(--line-2); border-bottom-width:2px; border-radius:5px; color:var(--soft); background:var(--paper); }
  .h-divider{ height:1px; background:var(--line); }
  .focus-ring:focus-visible{ outline:2px solid var(--accent); outline-offset:3px; border-radius:8px; }
  .progress{ height:5px; background:var(--line); border-radius:999px; overflow:hidden; }
  .progress > div{ height:100%; background:var(--ink); transition: width .45s cubic-bezier(.2,.8,.2,1); }
  .progress.accent > div{ background:var(--accent); }
  .card-tap{ cursor:pointer; transition: transform .18s cubic-bezier(.2,.7,.2,1), border-color .15s ease, box-shadow .2s ease; }
  .card-tap:hover{ border-color: color-mix(in oklab, var(--ink) 70%, transparent); transform: translateY(-2px); box-shadow: var(--shadow-lift); }
  .card-tap:active{ transform: translateY(0) scale(.995); }
  .flash{ perspective:1400px; }
  .flash-inner{ transition: transform .6s cubic-bezier(.2,.8,.2,1); transform-style:preserve-3d; position:relative; height:100%; }
  .flash.flipped .flash-inner{ transform: rotateY(180deg); }
  .flash-face{ backface-visibility:hidden; -webkit-backface-visibility:hidden; }
  .flash-back{ transform: rotateY(180deg); position:absolute; inset:0; }
  details>summary{ list-style:none; cursor:pointer; }
  details>summary::-webkit-details-marker{ display:none; }
  .kw{ border-bottom:1.5px dashed var(--accent); cursor:help; font-weight:500; transition: background .15s; }
  .kw:hover{ background:var(--accent-soft); }
  .modal-bg{ position:fixed; inset:0; background: color-mix(in oklab, var(--ink) 40%, transparent); z-index:60; display:none; align-items:center; justify-content:center; padding:16px; backdrop-filter: blur(6px); animation: fadeBg .25s ease; }
  @keyframes fadeBg{ from{opacity:0} to{opacity:1} }
  .modal-bg.open{ display:flex; }
  .fade-in{ animation: fadeIn .42s cubic-bezier(.2,.8,.2,1) backwards; }
  .stagger > *{ animation: fadeIn .55s cubic-bezier(.2,.8,.2,1) backwards; }
  .stagger > *:nth-child(1){ animation-delay: .02s; }
  .stagger > *:nth-child(2){ animation-delay: .08s; }
  .stagger > *:nth-child(3){ animation-delay: .14s; }
  .stagger > *:nth-child(4){ animation-delay: .2s; }
  .stagger > *:nth-child(5){ animation-delay: .26s; }
  .stagger > *:nth-child(6){ animation-delay: .32s; }
  @keyframes fadeIn{ from{ opacity:0; transform: translateY(10px);} to{ opacity:1; transform:none;}}
  .pulse-soft{ animation: ps 2.6s ease-in-out infinite; }
  @keyframes ps{ 0%,100%{ box-shadow: 0 0 0 0 color-mix(in oklab, var(--accent) 35%, transparent);} 70%{ box-shadow: 0 0 0 14px transparent;}}
  .opt{ width:100%; text-align:left; padding:16px 18px; border-radius:12px; border:1px solid var(--line); background:var(--paper); display:flex; align-items:center; gap:12px; min-height:60px; transition: all .18s cubic-bezier(.2,.7,.2,1); font-size:15px; color:var(--ink); cursor:pointer; }
  .opt:hover:not(:disabled){ border-color:var(--ink); transform: translateX(2px); }
  .opt .key{ font-family: ui-monospace, monospace; font-size:12px; padding:4px 9px; border:1px solid var(--line-2); border-radius:6px; color:var(--muted); flex-shrink:0; font-weight:600; }
  .opt.correct{ border-color: var(--ok); background: var(--ok-soft); }
  .opt.correct .key{ background: var(--ok); color:#fff; border-color: var(--ok); }
  .opt.wrong{ border-color: var(--bad); background: var(--bad-soft); }
  .opt.wrong .key{ background: var(--bad); color:#fff; border-color: var(--bad); }
  .timer-bar{ position:sticky; top:0; z-index:30; background: color-mix(in oklab, var(--bg) 92%, transparent); backdrop-filter: blur(12px); }
  .session-card{ min-height: 62vh; }
  ::-webkit-scrollbar{ width:8px; height:8px; }
  ::-webkit-scrollbar-thumb{ background: var(--line-2); border-radius:999px; }
  ::-webkit-scrollbar-track{ background: transparent; }
  @media (min-width: 768px){ .session-card{ min-height: 58vh; } }
  .swipe-hint{ opacity:0; transition: opacity .15s; }
  .flash.dragging .swipe-hint{ opacity:1; }
  .topbar{ position:sticky; top:0; z-index:40; backdrop-filter: blur(16px); background: color-mix(in oklab, var(--bg) 78%, transparent); border-bottom:1px solid color-mix(in oklab, var(--line) 70%, transparent); }
  .ring-progress{ transform: rotate(-90deg); }
  .num-mark{ font-family:"Fraunces", serif; font-feature-settings: "ss01","tnum"; font-variation-settings: "opsz" 144; }
  /* Mode card decorative number */
  .mode-num{ font-family:"Fraunces", serif; font-weight:600; font-variation-settings: "opsz" 144; line-height:1; letter-spacing:-.03em; color: color-mix(in oklab, var(--ink) 12%, transparent); position:absolute; right:18px; top:14px; font-size:64px; pointer-events:none; user-select:none; transition: color .2s; }
  .card-tap:hover .mode-num{ color: color-mix(in oklab, var(--accent) 35%, transparent); }
  .mode-card{ position:relative; overflow:hidden; }
  /* Smooth theme transition */
  html, body, .paper, .btn, .opt, .chip{ transition: background-color .25s ease, color .25s ease, border-color .25s ease; }
  /* Range / completion ring */
  .stat-ring{ width:48px; height:48px; }
  .stat-ring circle{ fill:none; stroke-width:4; }
  .stat-ring .bg{ stroke: var(--line); }
  .stat-ring .fg{ stroke: var(--accent); stroke-linecap: round; transition: stroke-dashoffset .6s cubic-bezier(.2,.8,.2,1); }
  /* hairline divider */
  .hr{ display:block; height:1px; background:var(--line); margin: 12px 0; }
  /* Quote-style intro */
  .lede{ font-family:"Fraunces", serif; font-weight:400; letter-spacing:-.01em; font-style:italic; color:var(--soft); }
  /* Countdown chip */
  .countdown{ display:inline-flex; align-items:center; gap:7px; padding:6px 12px; border-radius:999px; background:var(--ink); color:var(--bg); font-weight:600; font-size:12px; letter-spacing:.02em; }
  .countdown.urgent{ background:var(--accent); color:var(--accent-ink); }
  /* Dictée input — input ressemble à un trait sous le mot */
  .dictee{ font-family:"Fraunces", serif; font-size: 19px; line-height:1.85; color:var(--soft); letter-spacing:-.005em; }
  .dictee b{ color:var(--ink); }
  .dictee-input{ display:inline-block; min-width:90px; border:none; border-bottom:2px solid var(--line-2); padding:2px 6px; background:transparent; color:var(--ink); font:inherit; outline:none; text-align:center; transition: border-color .2s, background .2s; font-weight:600; }
  .dictee-input:focus{ border-color:var(--ink); background: color-mix(in oklab, var(--ink) 4%, transparent); }
  .dictee-input.ok{ border-color: var(--ok); background: var(--ok-soft); color: var(--ok); }
  .dictee-input.ko{ border-color: var(--bad); background: var(--bad-soft); color: var(--bad); }
  /* SVG schemas */
  .schema{ width:100%; max-width: 320px; height:auto; margin: 6px auto; display:block; }
  .schema text{ font-family:"Inter", sans-serif; font-size:10px; font-weight:600; fill: var(--ink); }
  .schema .label{ fill: var(--muted); font-weight:500; font-size:9px; }
  .schema .stroke{ stroke: var(--ink); stroke-width:1.5; fill:none; stroke-linecap:round; stroke-linejoin:round; }
  .schema .accent{ stroke: var(--accent); fill: var(--accent); }
  .schema .filament{ stroke: var(--accent); stroke-width:2; fill:none; }
  .schema .matter{ fill: var(--line); stroke: var(--ink); stroke-width:1.2; }
  /* TTS button */
  .icon-btn{ width:36px; height:36px; border-radius:10px; display:inline-flex; align-items:center; justify-content:center; border:1px solid var(--line-2); background:var(--paper); color:var(--ink); cursor:pointer; transition: all .15s; }
  .icon-btn:hover{ border-color: var(--ink); }
  .icon-btn.on{ background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }
  /* Print */
  @media print {
    .no-print{ display:none !important; }
    .topbar, .timer-bar{ display:none !important; }
    body{ background:#fff !important; color:#000 !important; }
    .paper, .paper-lift{ background:#fff !important; border:1px solid #aaa !important; box-shadow:none !important; page-break-inside: avoid; }
    main{ max-width: none !important; padding: 0 !important; }
    h1, h2, h3, h4{ page-break-after: avoid; }
    .print-section{ break-after: page; }
    .opt{ break-inside: avoid; }
    .serif, .lede{ font-family: Georgia, serif !important; }
    a, a:visited{ color:#000 !important; text-decoration: underline; }
  }
  /* Subtle hover lift on action buttons */
  @media (hover: hover) {
    .btn-primary:hover{ transform: translateY(-1px); }
  }
  /* Reduced motion */
  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition: none !important; }
  }
</style>
</head>
<body>
<header class="topbar">
  <div class="max-w-3xl mx-auto px-5 py-3 flex items-center gap-3">
    <a href="#" id="brandLink" class="flex items-center gap-2 group focus-ring rounded">
      <div class="w-7 h-7 rounded-md flex items-center justify-center" style="background:var(--ink);color:var(--bg);font-weight:700;font-family:'Fraunces',serif;">S</div>
      <div class="leading-tight">
        <div class="text-[10px] uppercase tracking-[0.18em] muted">Cycle 4 · Techno</div>
        <div class="font-semibold text-[13px]">Séquence 23</div>
      </div>
    </a>
    <div class="ml-auto flex items-center gap-2">
      <div id="streakChip" class="chip" title="Jours d'affilée">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2s2 4 2 7-2 5-5 5-5-2-5-5c0-1 .5-2 1-3 0 2 1 3 2 3 0-3 2-5 5-7Z"/><path d="M9 14.5C7.5 16 6 17.5 6 19.5 6 21 7.5 22 9 22s3-1 3-2.5c0-1.2-.6-2.2-1.5-3Z"/></svg>
        <span><b id="streakNum">0</b> j</span>
      </div>
      <button id="soundToggle" class="btn btn-ghost !min-h-0 !p-2 focus-ring" aria-label="Son" title="Sons">
        <svg id="iconSoundOn" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4Z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
        <svg id="iconSoundOff" class="hidden" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4Z"/><line x1="22" y1="9" x2="16" y2="15"/><line x1="16" y1="9" x2="22" y2="15"/></svg>
      </button>
      <button id="themeToggle" class="btn btn-ghost !min-h-0 !p-2 focus-ring" aria-label="Thème">
        <svg id="iconSun" class="hidden" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        <svg id="iconMoon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>

<main id="app" class="max-w-3xl mx-auto px-5 pb-24"></main>

  <div class="paper rounded-xl p-5 max-w-md w-full">
    <div class="flex items-start gap-3">
      <div class="flex-1">
        <div class="text-[10px] uppercase tracking-[0.2em] muted mb-1" id="modalKind">Définition</div>

<script>
const COURSE = {
  title: "Séquence 23",
  subtitle: "Design, maquette & prototypage rapide",
  meta: "Cycle 4 · CT 2.5 · CT 2.6",

  keywords: {
    "coopératif":"Mode de travail où chacun s'occupe d'une tâche **indépendante** des autres.",
    "collaboratif":"Mode de travail où tous travaillent **en même temps sur la même tâche**.",
    "coordonnateur":"Rôle : veille au bon fonctionnement du groupe et anime les débats.",
    "secrétaire":"Rôle : note les idées, rédige le compte-rendu, gère le dossier.",
    "rapporteur":"Rôle : présente à l'oral le travail du groupe (synthèse classe).",
    "gestionnaire":"Rôle : gère le matériel, les ordinateurs et le temps.",
    "maquette":"Représentation en 3D, à échelle réduite, **fidèle** dans ses proportions et son aspect.",
    "C.A.O.":"Conception Assistée par Ordinateur — logiciel de modélisation 3D.",
    "prototypage rapide":"Fabrication rapide, à faible coût, d'un premier exemplaire — peu d'outillages et d'étapes.",
    "imprimante 3D":"Fabrication par **addition** : une buse dépose un filament fondu, couche par couche.",
    "fraiseuse numérique":"Fabrication par **enlèvement** : taille dans la masse, pilotée par ordinateur.",
    "addition de matière":"On **ajoute** la matière couche par couche (impression 3D).",
    "enlèvement de matière":"On **retire** la matière d'un bloc brut (fraisage).",
    "Fablab":"« Fabrication laboratory » — lieu **ouvert au public** avec machines à commande numérique.",
    "garde-fou":"Rôle de la maquette : détecter à temps une erreur entre théorie et réalité.",
    "fichier de fabrication":"Fichier final lu par la machine ; vient après le paramétrage.",
    "problématique":"Question concrète à résoudre, à l'origine du projet (ex. : « comment ranger ses affaires en classe ? »).",
    "besoin":"Ce que l'utilisateur attend de l'objet — formulé simplement, sans solution technique.",
    "cahier des charges":"Document qui formalise le **besoin** + les **fonctions** + les **contraintes** auxquelles la solution doit répondre.",
    "fonction de service":"Action que l'objet doit rendre à l'utilisateur (« à quoi sert-il ? »).",
    "fonction contrainte":"Limite imposée à l'objet : sécurité, coût, taille, environnement, matière…",
    "croquis":"Dessin rapide à **main levée** d'une idée — pour réfléchir et communiquer une intention.",
    "schéma":"Représentation simplifiée et **normée** (symboles standards) — explique un fonctionnement.",
    "solution":"Proposition technique qui répond au cahier des charges (souvent dessinée en croquis/schéma).",
    "modélisation volumique":"Conception d'un objet en **3 dimensions** (largeur, hauteur, profondeur) à l'aide d'un logiciel de C.A.O.",
    "eDrawings":"Logiciel de C.A.O. : permet de **visualiser en 2D ou 3D** un objet, avec coupes et vues éclatées.",
    "SketchUp":"Logiciel de C.A.O. : permet de **créer, modifier** des structures et d'y insérer d'autres objets.",
    "Sweet Home 3D":"Logiciel de C.A.O. : permet de **lire ou créer des plans d'architecture** et des aménagements intérieurs.",
    "maquette virtuelle":"Modèle 3D produit avec un logiciel de CAO ; on l'obtient en ajoutant/enlevant des volumes simples."
  },

  essentials: [
    { id:"e1", t:"Maquette", d:"Représentation 3D, à échelle réduite, fidèle en proportions et aspect. Réelle ou numérique (C.A.O.). Joue un rôle de garde-fou, valide les solutions, permet la simulation.", tag:"définition pivot" },
    { id:"e2", t:"Coopératif vs Collaboratif", d:"Coopératif = tâches indépendantes. Collaboratif = même tâche, ensemble, en même temps. Piège récurrent au contrôle.", tag:"piège fréquent" },
    { id:"e3", t:"Les 4 rôles", d:"Coordonnateur (anime), Secrétaire (écrit), Rapporteur (oral), Gestionnaire (matériel + temps). Mémo : « CO·SE·RA·GE ».", tag:"à connaître par cœur" },
    { id:"e4", t:"Imprimante 3D = addition", d:"Une buse dépose un filament fondu sur un plateau, couche par couche, de bas en haut. Pilotée par ordinateur.", tag:"principe" },
    { id:"e5", t:"Fraiseuse = enlèvement", d:"Machine-outil à commande numérique. L'usinage taille dans la masse selon un fichier. On retire de la matière.", tag:"principe" },
    { id:"e6", t:"Chaîne CAO", d:"Modèle CAO → exportation → paramétrage → fichier de fabrication → fabrication. Mémo : « CEPaF ».", tag:"ordre exact" },
    { id:"e7", t:"C.A.O.", d:"Conception Assistée par Ordinateur. C'est un logiciel, jamais une machine.", tag:"définition" },

let audioCtx = null;
function audio(){
  if(!S.sound) return null;
  if(!audioCtx){
    try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }
    catch(e){ return null; }
  }
  if(audioCtx.state === "suspended") audioCtx.resume();
  return audioCtx;
}
function tone(freq, dur=0.08, type="sine", vol=0.06, attack=0.004){
  const ctx = audio(); if(!ctx) return;
  const t = ctx.currentTime;
  const osc = ctx.createOscillator();
  const g = ctx.createGain();
  osc.type = type; osc.frequency.value = freq;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol, t + attack);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  osc.connect(g).connect(ctx.destination);
  osc.start(t); osc.stop(t + dur + 0.02);
}

const tts = {
  supported: typeof window !== "undefined" && "speechSynthesis" in window,
  voice: null,
  pick(){
    if(!this.supported) return null;
    if(this.voice) return this.voice;
    const voices = speechSynthesis.getVoices();
    this.voice = voices.find(v=>v.lang.startsWith("fr") && /fem|female|amélie|julie|virginie|audrey/i.test(v.name))
              || voices.find(v=>v.lang.startsWith("fr"))
              || voices[0];
    return this.voice;
  },
  speak(text){
    if(!this.supported) return;
    speechSynthesis.cancel();
    const tmp = document.createElement("div");
    tmp.innerHTML = text;
    const u = new SpeechSynthesisUtterance(tmp.textContent || tmp.innerText || "");
    const v = this.pick();
    if(v) u.voice = v;
    u.rate = 1; u.pitch = 1; u.lang = "fr-FR";
    speechSynthesis.speak(u);
  },
  stop(){ if(this.supported) speechSynthesis.cancel(); }
};

const SR = {
  state(i){
    if(!S.srs[i]) S.srs[i] = { ease: 2.5, reps: 0, due: 0, lastSeen: 0 };
    return S.srs[i];
  },
  grade(i, known){
    const s = SR.state(i);
    s.lastSeen = Date.now();
    if(known){
      s.reps++;
      s.ease = Math.min(2.7, s.ease + 0.1);
      // intervals: 10min, 1d, 3d, 7d, 14d…
      const intervals = [10*60e3, 24*3600e3, 3*24*3600e3, 7*24*3600e3, 14*24*3600e3, 30*24*3600e3];
      s.due = Date.now() + (intervals[Math.min(s.reps-1, intervals.length-1)] || 30*24*3600e3) * (s.ease / 2.5);
    } else {
      s.reps = 0;
      s.ease = Math.max(1.3, s.ease - 0.2);
      s.due = Date.now() + 10*60e3;
    }
    save();
  },
  dueNow(){
    return COURSE.flashcards.map((c,i)=>({c,i,s:SR.state(i)}))
      .filter(x => x.s.due <= Date.now())
      .sort((a,b)=> (a.s.reps - b.s.reps) || (a.s.due - b.s.due));
  },
  dueCount(){ return SR.dueNow().length; }
};

        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="muted"><path d="m9 6 6 6-6 6"/></svg>
      </button>
    `));
  }

  // --- 3 MODES (the centerpiece) -------------------------------------------
  const modes = [
    { id:"flash",   num:"01", title:"Flash",       time:"3 min",  desc:"L'essentiel en moins de 5 minutes." },
    { id:"express", num:"02", title:"Express",     time:"8 min",  desc:"Un tour complet du cours." },
    { id:"deep",    num:"03", title:"Approfondie", time:"20 min", desc:"Pomodoro : focus, pause, consolidation." }
  ];

  const modesWrap = html(`<div class="space-y-3 stagger"></div>`);
  modes.forEach((m,i)=>{
    const recommended = m.id===suggestion;
    const score = S.best[m.id]||0;

              <span class="text-[12px] muted">${m.time}</span>
              ${score>0 ? `<span class="chip">Meilleur · <b class="ink ml-0.5">${Math.round(score)}%</b></span>` : ''}

  const secondary = html(`<div class="grid sm:grid-cols-2 gap-3 stagger"></div>`);
  secondary.appendChild(html(`
    <button class="paper rounded-xl p-5 text-left card-tap focus-ring" data-mode="exam">
      <div class="flex items-center justify-between gap-2 mb-2">
        <span class="chip chip-bad">Évaluation</span>
        ${S.best.exam?`<span class="text-[12px] muted">★ <b class="ink">${S.best.exam.toFixed(1)}</b>/20</span>`:''}
      </div>
      <div class="serif text-[22px] font-semibold leading-tight">Examen blanc</div>
      <p class="text-[13.5px] soft mt-1.5 leading-relaxed">10 questions chrono · note /20 + axes ciblés.</p>
    </button>
  `));
  secondary.appendChild(html(`
    <button class="paper rounded-xl p-5 text-left card-tap focus-ring" data-mode="clutch">
      <div class="flex items-center justify-between gap-2 mb-2">
        <span class="chip chip-warn">Panique</span>
        <span class="text-[12px] muted">2 min</span>
      </div>
      <div class="serif text-[22px] font-semibold leading-tight">5 min avant le contrôle</div>
      <p class="text-[13.5px] soft mt-1.5 leading-relaxed">Les 5 trucs critiques + les pièges + mnémo. Mode sauvetage.</p>
    </button>
  `));
  secondary.appendChild(html(`
    <button class="paper rounded-xl p-5 text-left card-tap focus-ring" data-go="tools">
      <div class="flex items-center justify-between gap-2 mb-2">
        <span class="chip">Libre</span>
        <span class="text-[12px] muted">7 outils</span>
      </div>
      <div class="serif text-[22px] font-semibold leading-tight">Boîte à outils</div>
      <p class="text-[13.5px] soft mt-1.5 leading-relaxed">Synthèse, flashcards, QCM, mind map, mnémo, libre, essentiels.</p>
    </button>
  `));
  el.appendChild(secondary);

  // --- STATS (only if anything) -------------------------------------------
  if(hasHistory || S.streak.count>0){
    const stats = html(`<div class="flex items-center justify-between gap-4 flex-wrap pt-2"></div>`);
    const circ = 2*Math.PI*22;
    const off = circ - (overallPct/100)*circ;
    stats.appendChild(html(`
      <div class="flex items-center gap-3">
        <svg class="stat-ring" viewBox="0 0 50 50" aria-hidden="true">
          <circle class="bg" cx="25" cy="25" r="22"/>
          <circle class="fg ring-progress" cx="25" cy="25" r="22" stroke-dasharray="${circ}" stroke-dashoffset="${off}"/>
        </svg>
        <div>
          <div class="text-[11px] uppercase tracking-[0.18em] muted">Progression</div>
          <div class="serif text-[22px] font-semibold leading-tight">${overallPct}<span class="muted text-sm">%</span></div>
        </div>
      </div>
      <div class="flex items-center gap-6 text-right">
        <div>
          <div class="text-[11px] uppercase tracking-[0.18em] muted">Série</div>
          <div class="serif text-[22px] font-semibold leading-tight">${S.streak.count} <span class="muted text-sm">jours</span></div>
        </div>
        <div>
          <div class="text-[11px] uppercase tracking-[0.18em] muted">Sessions</div>
          <div class="serif text-[22px] font-semibold leading-tight">${S.stats?.runs||0}</div>
        </div>
      </div>
    `));
    el.appendChild(stats);
  }

  // --- 80/20 PROMISE (small + clickable for full panel) -------------------
  el.appendChild(html(`
    <div class="pt-2">
      <p class="text-[13.5px] muted leading-relaxed max-w-xl">
        Toutes les sessions appliquent <b class="ink">Pareto 80/20</b> : tu révises en priorité les
        <b class="ink">11 concepts</b> qui rapportent le plus de points, calés sur ton évaluation.
        <button class="ink underline-offset-2 hover:underline" data-go="tools" data-tab="essentials" style="text-underline-offset:3px">Voir les 11 →</button>
      </p>
    </div>
  `));

  el.addEventListener("click", e=>{
    const p = e.target.closest("[data-plan]");
    if(p){
      e.preventDefault();
      const id = p.dataset.plan;
      planCheck(id, !planDone(id));
      sfx.tap();
      render();
      return;
    }
    const m = e.target.closest("[data-mode]");
    if(m){ launchSession(m.dataset.mode); return; }
    const g = e.target.closest("[data-go]");
    if(g){
      if(g.dataset.tab){ S.toolsTab = g.dataset.tab; save(); }
      go(g.dataset.go); return;
    }
  });

  return el;
}

function launchSession(mode){
  let plan, durationSec, label;
  const coreFlash = COURSE.flashcards.filter(f=>f.core);
  const coreQcm   = COURSE.qcm.filter(q=>q.core);
  const allFlash  = COURSE.flashcards;
  const allQcm    = COURSE.qcm;

  if(mode==="flash"){
    label="Flash"; durationSec=180;
    plan = [
      { type:"intro", title:"80/20 · 3 min", body:"On ne révise QUE les 8 concepts qui rapportent le plus. Reste concentré·e, c'est très court." },
      ...shuffle([...coreFlash]).slice(0,5).map(f=>({ type:"flash", ...f })),
      ...shuffle([...coreQcm]).slice(0,3).map(q=>({ type:"qcm", ...q })),
      { type:"outro" }
    ];
  } else if(mode==="express"){
    label="Express"; durationSec=480;
    plan = [
      { type:"intro", title:"Express · 8 min", body:"Tour complet rapide. On enchaîne sans réfléchir au menu." },
      ...shuffle([...allFlash]).slice(0,8).map(f=>({ type:"flash", ...f })),
      ...shuffle([...allQcm]).slice(0,5).map(q=>({ type:"qcm", ...q })),
      ...shuffle([...COURSE.libre]).slice(0,1).map(l=>({ type:"libre", ...l })),
      { type:"outro" }
    ];
  } else if(mode==="deep"){
    label="Approfondie · Pomodoro"; durationSec=20*60;
    plan = [
      { type:"intro", title:"Pomodoro · 20 min", body:"3 phases : <b>15 min focus</b> (essentiels + QCM), <b>2 min pause</b>, <b>3 min consolidation</b> (pièges + mnémo). Reste avec moi." },
      { type:"phase", title:"Phase 1 · Focus", note:"Mémorisation active" },
      { type:"read", title:"Les 8 essentiels", body: COURSE.essentials.map((e,i)=>`<div class="paper rounded-lg p-3 mb-2"><div class="text-[11px] muted">${String(i+1).padStart(2,'0')} · ${e.tag}</div><div class="font-semibold mt-0.5">${e.t}</div><div class="text-[13px] soft mt-1">${e.d}</div></div>`).join("") },
      ...allFlash.map(f=>({ type:"flash", ...f })),
      ...allQcm.map(q=>({ type:"qcm", ...q })),
      { type:"pause", duration:120 },
      { type:"phase", title:"Phase 2 · Consolidation", note:"Pièges + mnémo" },
      { type:"read", title:"Pièges fréquents", body: COURSE.pieges.map(p=>`<div class="paper rounded-lg p-3 mb-2"><div class="font-semibold">${p.t}</div><div class="text-[13px] soft mt-1">${p.d}</div></div>`).join("") },
      { type:"read", title:"Moyens mnémotechniques", body: COURSE.mnemos.map(m=>`<div class="paper rounded-lg p-3 mb-2"><div class="font-semibold">${m.t}</div><div class="text-[13px] soft mt-1">${m.d}</div></div>`).join("") },
      ...shuffle([...COURSE.libre]).slice(0,2).map(l=>({ type:"libre", ...l })),
      { type:"outro" }
    ];
  } else if(mode==="exam"){
    label="Examen blanc"; durationSec=8*60;
    const q = [...shuffle(allQcm).slice(0,7).map(q=>({ type:"qcm", ...q, examMode:true })),
               ...shuffle(COURSE.libre).slice(0,3).map(l=>({ type:"libre", ...l, examMode:true }))];
    plan = [
      { type:"intro", title:"Examen · 8 min", body:"10 questions chrono, pas de retour. À la fin : note /20." },
      ...shuffle(q),
      { type:"outro", isExam:true }
    ];
  } else if(mode==="clutch"){
    label="Mode panique · 2 min"; durationSec=120;
    plan = [
      { type:"intro", title:"5 min avant le contrôle", body:"On ne révise QUE les 5 trucs critiques. Lis lentement, c'est ce qui te rapportera le plus de points." },
      ...coreFlash.slice(0,5).map(f=>({ type:"flash", ...f })),
      { type:"read", title:"Les 4 pièges à éviter", body: COURSE.pieges.map(p=>`<div class="paper rounded-lg p-3 mb-2"><div class="font-semibold">⚠ ${p.t}</div><div class="text-[13px] soft mt-1">${p.d}</div></div>`).join("") },
      { type:"read", title:"Mnémo de secours", body: COURSE.mnemos.map(m=>`<div class="paper rounded-lg p-3 mb-2"><div class="font-semibold">${m.t}</div><div class="text-[13px] soft mt-1">${m.d}</div></div>`).join("") },
      { type:"outro" }
    ];
  } else if(mode==="weak"){
    // Build a session from the user's weak points
    const wq = Weak.hitsSorted("qcm").slice(0,5).map(x=>({type:"qcm", ...allQcm[x.idx]}));
    const wl = Weak.hitsSorted("libre").slice(0,2).map(x=>({type:"libre", ...COURSE.libre[x.idx]}));
    if(wq.length+wl.length === 0){
      // Nothing weak yet, fallback to flash
      return launchSession("flash");
    }
    label="Mes faiblesses"; durationSec = 240;
    plan = [
      { type:"intro", title:"Tes faiblesses · 4 min", body:"Les questions où tu as le plus chuté. On les retravaille." },
      ...wq, ...wl,
      { type:"outro" }
    ];
  } else if(mode==="review"){
    // Spaced-repetition due flashcards
    const due = SR.dueNow();
    if(due.length === 0) return launchSession("flash");
    label=`Révision espacée · ${due.length}`; durationSec = Math.min(600, due.length*30);
    plan = [
      { type:"intro", title:"À revoir maintenant", body:`${due.length} carte${due.length>1?'s':''} à consolider d'après ta progression personnelle.` },
      ...due.map(x=>({ type:"flash", ...x.c, _srIdx: x.i })),
      { type:"outro" }
    ];
  } else { return; }

  go("session", { mode, label, plan, idx:0, startedAt: Date.now(), durationSec, score:{ok:0,total:0}, paused:false });
}

function viewSession(){
  const ses = S.session;
  const el = html(`<section class="pt-3"></section>`);
  const stepsTotal = ses.plan.length;
  const stepNow = Math.min(ses.idx+1, stepsTotal);

  const bar = html(`
    <div class="timer-bar -mx-5 px-5 py-3 mb-4 border-b line">
      <div class="max-w-3xl mx-auto flex items-center gap-3">
        <button class="btn btn-ghost !min-h-0 !p-2" id="sExit" aria-label="Quitter">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 6-6 6 6 6"/></svg>
        </button>
        <div class="flex-1">
          <div class="flex items-center justify-between text-[11px] muted mb-1.5">
            <span>${ses.label} · ${stepNow}/${stepsTotal}</span>
            <span class="font-mono"><span id="sTimer">${fmt(ses.durationSec)}</span></span>
          </div>
          <div class="progress accent"><div id="sBar" style="width:0%"></div></div>
        </div>
        <button class="btn btn-ghost !min-h-0 !p-2" id="sPause" aria-label="Pause">
          <svg id="sIconPause" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/></svg>
          <svg id="sIconPlay" class="hidden" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </button>
      </div>
    </div>
  `);
  el.appendChild(bar);

  const stage = html(`<div id="sStage" class="session-card"></div>`);
  el.appendChild(stage);

  let remaining = ses.durationSec;
  let tickId = null;
  function startTimer(){
    clearInterval(tickId);
    tickId = setInterval(()=>{
      if(ses.paused) return;
      remaining--;
      $("#sTimer", el).textContent = fmt(Math.max(0, remaining));
      if(remaining<=0){ clearInterval(tickId); endSession(); }
    }, 1000);
  }
  function pause(){
    ses.paused = !ses.paused;
    $("#sIconPause", el).classList.toggle("hidden", ses.paused);
    $("#sIconPlay", el).classList.toggle("hidden", !ses.paused);
  }
  $("#sPause", el).addEventListener("click", pause);
  $("#sExit", el).addEventListener("click", ()=>{
    if(confirm("Quitter la session ?")){
      clearInterval(tickId);
      go("home");
    }
  });

  function updateProgress(){
    const pos = Math.min(ses.idx, stepsTotal);
    $("#sBar", el).style.width = Math.round((pos/stepsTotal)*100) + "%";
  }
  function nextStep(){
    ses.idx++;
    if(ses.idx >= stepsTotal){ endSession(); return; }
    renderStep();
  }
  function renderStep(){
    updateProgress();
    const step = ses.plan[ses.idx];
    stage.innerHTML = "";
    const renderer = renderers[step.type];
    if(!renderer){ nextStep(); return; }
    stage.appendChild(renderer(step));
    attachKw(stage);
  }

  const renderers = {
    intro: step => {
      const c = html(`
        <div class="paper rounded-2xl p-8 md:p-12 text-center fade-in flex flex-col items-center justify-center min-h-[55vh]">
          <div class="text-[10px] uppercase tracking-[0.3em] muted">Commence ici</div>
          <h2 class="serif text-[40px] md:text-[56px] font-semibold mt-3 leading-tight">${step.title}</h2>
          <p class="text-[15.5px] soft mt-4 max-w-md mx-auto leading-relaxed">${step.body}</p>
          <button class="btn btn-primary mt-8 pulse-soft text-base px-7" id="goStart">Commencer →</button>
          <div class="text-[12px] muted mt-5 flex flex-wrap gap-x-3 gap-y-2 justify-center">
            <span><span class="kbd">Espace</span> retourner</span>
            <span><span class="kbd">→</span> suivant</span>
          </div>
        </div>`);
      c.querySelector("#goStart").addEventListener("click", ()=>{ startTimer(); nextStep(); });
      return c;
    },
    phase: step => {
      const c = html(`
        <div class="paper rounded-xl p-6 text-center fade-in">
          <div class="text-[11px] uppercase tracking-[0.22em] muted">${step.note}</div>
          <h3 class="serif text-2xl font-semibold mt-1">${step.title}</h3>
          <button class="btn btn-primary mt-4" id="goNext">Continuer →</button>
        </div>`);
      c.querySelector("#goNext").addEventListener("click", nextStep);
      return c;
    },
    read: step => {
      const c = html(`
        <div class="fade-in">
          <div class="serif text-2xl font-semibold mb-3">${step.title}</div>
          <div>${step.body}</div>
          <div class="flex justify-end mt-4"><button class="btn btn-primary" id="goNext">Compris, suivant →</button></div>
        </div>`);
      c.querySelector("#goNext").addEventListener("click", nextStep);
      return c;
    },
    pause: step => {
      let left = step.duration;
      const c = html(`
        <div class="paper rounded-2xl p-10 md:p-16 text-center fade-in flex flex-col items-center justify-center min-h-[55vh]" style="background:var(--accent-soft); border-color:transparent">
          <div class="text-[10px] uppercase tracking-[0.3em]" style="color:var(--accent)">Pause active</div>
          <h3 class="serif text-[44px] md:text-[64px] font-semibold mt-3 ink leading-tight">Respire.</h3>
          <p class="text-[15.5px] soft mt-4 max-w-sm leading-relaxed">Étire-toi, regarde au loin. Tu reviens dans</p>
          <div class="serif text-[56px] md:text-[80px] font-semibold ink mt-2 leading-none tabular-nums" id="pauseCd">${fmt(left)}</div>
          <button class="btn mt-7" id="skipPause">Passer la pause</button>
        </div>`);
      const cd = c.querySelector("#pauseCd");
      const it = setInterval(()=>{
        if(ses.paused) return;
        left--; if(cd) cd.textContent = fmt(Math.max(0,left));
        if(left<=0){ clearInterval(it); nextStep(); }
      }, 1000);
      c.querySelector("#skipPause").addEventListener("click", ()=>{ clearInterval(it); nextStep(); });
      return c;
    },
    flash: step => {
      const c = html(`
        <div class="fade-in">
          <div class="flex items-center justify-between mb-3">
            <div class="text-[10px] uppercase tracking-[0.28em] muted">Flashcard${step.core?' · essentielle':''}</div>
            <button class="icon-btn" id="ttsBtn" aria-label="Lire à voix haute" title="Lire à voix haute">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H2v6h4l5 4Z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
            </button>
          </div>
          <div class="flash relative h-72 md:h-[22rem]" tabindex="0">
            <div class="flash-inner w-full h-full">
              <div class="flash-face paper-lift rounded-2xl w-full h-full p-8 md:p-10 flex flex-col items-center justify-center text-center">
                <div class="serif text-[24px] md:text-[32px] font-semibold leading-[1.2] max-w-xl">${step.q}</div>
                <div class="text-[11px] muted mt-6">Touche / clic pour retourner</div>
                <div class="swipe-hint chip chip-bad absolute left-4 top-4">← à revoir</div>
                <div class="swipe-hint chip chip-ok absolute right-4 top-4">je sais →</div>
              </div>
              <div class="flash-face flash-back paper-lift rounded-2xl w-full h-full p-8 md:p-10 flex flex-col items-center justify-center text-center" style="border-color:var(--ink)">
                <div class="text-[10px] uppercase tracking-[0.28em] muted mb-3">Réponse</div>
                <div class="text-[16px] md:text-[19px] leading-[1.55] max-w-xl">${step.a}</div>
              </div>
            </div>
          </div>
          <div class="grid grid-cols-2 gap-2 mt-4">
            <button class="btn" id="fRev">À revoir</button>
            <button class="btn btn-primary" id="fOk">Je sais →</button>
          </div>
        </div>`);
      const f = c.querySelector(".flash");
      f.addEventListener("click", e=>{ if(e.target.closest("button")) return; f.classList.toggle("flipped"); sfx.flip(); });
      const srIdx = step._srIdx !== undefined ? step._srIdx : COURSE.flashcards.findIndex(card => card.q === step.q);
      c.querySelector("#fOk").addEventListener("click", ()=>{
        ses.score.ok++; ses.score.total++; sfx.right();
        if(srIdx>=0) SR.grade(srIdx, true);
        nextStep();
      });
      c.querySelector("#fRev").addEventListener("click", ()=>{
        ses.score.total++; sfx.tap();
        if(srIdx>=0) SR.grade(srIdx, false);
        nextStep();
      });
      c.querySelector("#ttsBtn").addEventListener("click", e=>{
        e.stopPropagation();
        const txt = f.classList.contains("flipped") ? step.a : step.q;
        tts.speak(txt);
      });
      let startX=0, dx=0, drag=false;
      const down=x=>{ startX=x; dx=0; drag=true; f.classList.add("dragging"); f.style.transition="none"; };
      const move=x=>{ if(!drag) return; dx=x-startX; f.style.transform=`translateX(${dx}px) rotate(${dx/22}deg)`; };
      const up=()=>{ if(!drag) return; drag=false; f.classList.remove("dragging"); f.style.transition="";
        if(Math.abs(dx)>90){ const dir=dx>0; f.style.transform=`translateX(${dir?500:-500}px)`; setTimeout(()=>{ f.style.transform=""; if(dir){ ses.score.ok++; } ses.score.total++; nextStep(); },180); }
        else f.style.transform=""; };
      f.addEventListener("touchstart",e=>down(e.touches[0].clientX),{passive:true});
      f.addEventListener("touchmove", e=>move(e.touches[0].clientX),{passive:true});
      f.addEventListener("touchend", up);
      f.addEventListener("mousedown",e=>down(e.clientX));
      window.addEventListener("mousemove",e=>move(e.clientX));
      window.addEventListener("mouseup",up);
      f.addEventListener("keydown", e=>{
        if(e.key===" "||e.key==="Enter"){ e.preventDefault(); f.classList.toggle("flipped"); }
        if(e.key==="ArrowRight"){ ses.score.ok++; ses.score.total++; nextStep(); }
        if(e.key==="ArrowLeft"){ ses.score.total++; nextStep(); }
      });
      setTimeout(()=>f.focus(), 30);
      return c;
    },
    qcm: step => {
      const c = html(`
        <div class="fade-in">
          <div class="flex items-center gap-2 mb-3">
            <span class="chip">QCM</span>
            <span class="chip ${step.lvl===1?'chip-ok':step.lvl===2?'chip-warn':'chip-bad'}">Niveau ${step.lvl}</span>
          </div>
          <h3 class="serif text-[22px] md:text-[28px] font-semibold leading-tight">${step.q}</h3>
          <div class="grid gap-2.5 mt-5 stagger" id="qOpts">
            ${step.o.map((o,k)=>`<button class="opt" data-k="${k}"><span class="key">${"ABCD"[k]}</span><span class="flex-1">${o}</span></button>`).join("")}
          </div>
          <div id="qExp" class="hidden paper rounded-xl p-4 text-[14.5px] mt-4 leading-relaxed"></div>
          <div class="flex justify-end mt-4 hidden" id="qNextWrap"><button class="btn btn-primary" id="qNext">Suivant →</button></div>
        </div>`);
      const opts = c.querySelectorAll("#qOpts .opt");
      opts.forEach(b=>{
        b.addEventListener("click", ()=>{
          const k = +b.dataset.k;
          ses.score.total++;
          const ok = k===step.c;
          if(ok){ ses.score.ok++; sfx.right(); } else {
            sfx.wrong();
            const qIdx = COURSE.qcm.findIndex(x => x.q === step.q);
            if(qIdx>=0) Weak.hit("qcm", qIdx);
          }
          opts.forEach(o=>o.disabled=true);
          opts[k].classList.add(ok?"correct":"wrong");
          if(!ok) opts[step.c].classList.add("correct");
          if(!step.examMode){
            const exp = c.querySelector("#qExp");
            exp.classList.remove("hidden");
            exp.innerHTML = `<div class="font-semibold mb-1" style="color:${ok?'var(--ok)':'var(--bad)'}">${ok?"✓ Bonne réponse":"✗ Pas cette fois"}</div>${step.e}`;
            c.querySelector("#qNextWrap").classList.remove("hidden");
            c.querySelector("#qNext").addEventListener("click", nextStep);
          } else {
            setTimeout(nextStep, 600);
          }
        });
      });
      return c;
    },
    libre: step => {
      const c = html(`
        <div class="fade-in">
          <div class="chip mb-3">Réponse libre</div>
          <h3 class="serif text-[22px] md:text-[28px] font-semibold leading-tight">${step.q}</h3>
          <textarea id="lInput" rows="4" placeholder="Réponds avec tes mots…" class="w-full paper rounded-xl p-4 mt-4 focus-ring text-[15.5px] leading-relaxed" style="outline:none; resize:vertical"></textarea>
          <div class="flex gap-2 mt-3">
            <button class="btn btn-primary flex-1" id="lCheck">Vérifier</button>
            <button class="btn" id="lSkip">Passer</button>
          </div>
          <div id="lFb" class="hidden paper rounded-xl p-4 text-[14.5px] mt-4 leading-relaxed"></div>
          <div class="flex justify-end mt-3 hidden" id="lNextWrap"><button class="btn btn-primary" id="lNext">Suivant →</button></div>
        </div>`);
      c.querySelector("#lCheck").addEventListener("click", ()=>{
        const val = normalize(c.querySelector("#lInput").value);
        const found = step.kw.filter(k=> val.includes(normalize(k))).length;
        ses.score.total++;
        let lbl="✗ À retravailler", col="var(--bad)";
        if(found >= step.min){ ses.score.ok++; lbl="✓ Validé"; col="var(--ok)"; }
        else if(found >= Math.max(1, step.min-1)){ ses.score.ok += 0.5; lbl="≈ Partiel"; col="var(--warn)"; }
        const fb = c.querySelector("#lFb"); fb.classList.remove("hidden");
        fb.innerHTML = `<div class="font-semibold mb-1" style="color:${col}">${lbl} · ${found}/${step.kw.length} mots-clés</div><div class="soft"><b>Modèle :</b> ${step.ideal}</div>`;
        c.querySelector("#lNextWrap").classList.remove("hidden");
        c.querySelector("#lNext").addEventListener("click", nextStep);
        c.querySelector("#lCheck").disabled = true;
        c.querySelector("#lInput").disabled = true;
      });
      c.querySelector("#lSkip").addEventListener("click", ()=>{ ses.score.total++; nextStep(); });
      return c;
    },
    outro: step => {
      const pct = ses.score.total>0 ? Math.round((ses.score.ok/ses.score.total)*100) : 0;
      const note20 = ses.score.total>0 ? (ses.score.ok/ses.score.total)*20 : 0;
      const slot = ses.mode;
      const value = slot==="exam" ? note20 : pct;
      if(value > (S.best[slot]||0)) S.best[slot] = value;
      S.history.push({ mode:ses.mode, score:pct, note:note20, date:new Date().toISOString() });
      S.stats.runs++;
      S.stats.totalMin += Math.round((Date.now() - ses.startedAt)/60000);
      save(); bumpStreak();
      if(pct >= 50) sfx.done();
      let cheer = "Bien joué.";
      if(pct>=85) cheer = "Excellent. Tu as les bases solides.";
      else if(pct>=65) cheer = "Bon score. Encore une session et c'est dans la poche.";
      else cheer = "Pas grave. Refais une Flash, ça va se débloquer.";
      const isExam = step.isExam || ses.mode==="exam";
      const c = html(`
        <div class="paper-lift rounded-2xl p-8 md:p-12 fade-in">
          <div class="text-[10px] uppercase tracking-[0.3em] muted">Session terminée</div>
          ${isExam ? `
            <h2 class="serif text-[64px] md:text-[88px] font-semibold mt-2 leading-none">${note20.toFixed(1)}<span class="muted text-3xl ml-1">/20</span></h2>
          ` : `
            <h2 class="serif text-[64px] md:text-[88px] font-semibold mt-2 leading-none">${pct}<span class="muted text-3xl ml-0.5">%</span></h2>
          `}
          <p class="lede text-lg md:text-xl mt-3 max-w-md">${cheer}</p>
          <div class="h-divider my-7"></div>
          <div class="grid grid-cols-3 gap-3 text-center">
            <div><div class="muted text-[10px] uppercase tracking-wider">Bonnes</div><div class="serif text-[28px] font-semibold mt-1">${Math.round(ses.score.ok)}</div></div>
            <div><div class="muted text-[10px] uppercase tracking-wider">Total</div><div class="serif text-[28px] font-semibold mt-1">${ses.score.total}</div></div>
            <div><div class="muted text-[10px] uppercase tracking-wider">Série</div><div class="serif text-[28px] font-semibold mt-1">${S.streak.count}<span class="muted text-sm ml-1">j</span></div></div>
          </div>
          <div class="flex gap-2 mt-7 flex-wrap">
            <button class="btn btn-primary flex-1" id="oAgain">Refaire</button>
            ${ses.mode==="flash" ? '<button class="btn flex-1" id="oExpress">Passer en Express</button>' : ''}
            ${ses.mode==="express" ? '<button class="btn flex-1" id="oDeep">Passer en Approfondie</button>' : ''}
            <button class="btn flex-1" id="oHome">Accueil</button>
          </div>
        </div>`);
      c.querySelector("#oAgain").addEventListener("click", ()=> launchSession(ses.mode));
      c.querySelector("#oHome").addEventListener("click", ()=> go("home"));
      const oe = c.querySelector("#oExpress"); if(oe) oe.addEventListener("click", ()=> launchSession("express"));
      const od = c.querySelector("#oDeep");    if(od) od.addEventListener("click", ()=> launchSession("deep"));
      clearInterval(tickId);
      return c;
    }
  };

  function endSession(){
    ses.idx = stepsTotal - 1;
    renderStep();
  }

  renderStep();
  return el;
}

        <div class="paper rounded-xl p-5 mb-3">
          <div class="text-[11px] uppercase tracking-wider muted">Podcast · ~5 min</div>
          <h3 class="serif text-xl font-semibold mt-1">Tout le cours dans tes écouteurs</h3>
          <p class="text-[14px] soft mt-2 leading-relaxed">L'app te lit tout le cours à voix haute. Mets tes écouteurs, marche, écoute. Sans regarder l'écran.</p>
          <div class="flex gap-2 mt-4">
            <button class="btn btn-primary flex-1" id="playRecap">▶ Lecture</button>
            <button class="btn" id="stopRecap">■ Stop</button>
          </div>
          <p id="recapStatus" class="text-[12px] muted mt-3"></p>
        </div>`;
      const status = c.querySelector("#recapStatus");
      c.querySelector("#playRecap").addEventListener("click", ()=>{
        if(!tts.supported){ status.textContent = "Ton navigateur ne supporte pas la lecture vocale."; return; }
        tts.speak(recap);
        status.textContent = "En cours de lecture… touche Stop pour arrêter.";
      });
      c.querySelector("#stopRecap").addEventListener("click", ()=>{ tts.stop(); status.textContent = "Arrêté."; });
      return c;
    },
    breathe: ()=>{
      const c = html(`<div></div>`);
      c.innerHTML = `
        <div class="paper rounded-xl p-5 mb-3 text-center">
          <div class="text-[11px] uppercase tracking-wider muted">Anti-stress · 1 min</div>
          <h3 class="serif text-xl font-semibold mt-1">Respire 4-7-8</h3>
          <p class="text-[13.5px] soft mt-2 leading-relaxed max-w-md mx-auto">Méthode du Dr Andrew Weil. Avant un contrôle, ça calme le cœur en 4 cycles. Inspire 4 s, retiens 7 s, expire 8 s.</p>
        </div>
        <div class="paper-lift rounded-2xl p-6 md:p-10 flex flex-col items-center justify-center text-center" style="background:var(--accent-soft); border-color:transparent">
          <svg viewBox="0 0 200 200" width="200" height="200" id="brSvg">
            <circle cx="100" cy="100" r="40" fill="var(--accent)" opacity="0.85" id="brCircle" style="transition: r 1s ease-in-out, opacity 1s ease-in-out"/>
          </svg>
          <div id="brLabel" class="serif text-2xl font-semibold mt-3 ink">Prêt ?</div>
          <div id="brCount" class="serif text-5xl font-semibold ink mt-1 tabular-nums">·</div>
          <button class="btn btn-primary mt-5" id="brStart">Démarrer</button>
        </div>`;
      const circle = c.querySelector("#brCircle");
      const label = c.querySelector("#brLabel");
      const count = c.querySelector("#brCount");
      const btn = c.querySelector("#brStart");
      let running = false, timer = null;
      async function phase(name, secs, radius){
        label.textContent = name;
        circle.setAttribute("r", radius);
        if(name === "Inspire") sfx.pause();
        for(let s=secs; s>0; s--){
          if(!running) return;
          count.textContent = s;
          await new Promise(r=> timer = setTimeout(r, 1000));
        }
      }
      async function run(){
        running = true;
        btn.textContent = "Arrêter";
        for(let i=0; i<4 && running; i++){
          await phase("Inspire", 4, 85);
          if(!running) break;
          await phase("Retiens", 7, 85);
          if(!running) break;
          await phase("Expire", 8, 40);
        }
        if(running){ label.textContent = "Terminé"; count.textContent = "✓"; sfx.done(); }
        running = false;
        btn.textContent = "Recommencer";
        circle.setAttribute("r", 40);
      }
      btn.addEventListener("click", ()=>{
        if(running){ running = false; clearTimeout(timer); btn.textContent = "Démarrer"; label.textContent = "Arrêté"; count.textContent = "·"; circle.setAttribute("r", 40); return; }
        run();
      });
      return c;
    },
    flash: ()=>{
      let i = 0;
      const c = html(`
        <div>
          <div class="flex items-center justify-between text-[12px] muted mb-2"><span><b id="fI" class="ink">1</b>/${COURSE.flashcards.length}</span><span>Tap pour retourner</span></div>
          <div class="flash relative h-64 md:h-72" tabindex="0">
            <div class="flash-inner w-full h-full">
              <div class="flash-face paper rounded-xl w-full h-full p-6 flex items-center justify-center text-center">
                <div class="serif text-xl font-semibold leading-snug" id="fQ"></div>
              </div>
              <div class="flash-face flash-back paper rounded-xl w-full h-full p-6 flex items-center justify-center text-center" style="border-color:var(--ink)">
                <div class="text-[15px] leading-relaxed" id="fA"></div>
              </div>
            </div>
          </div>
          <div class="grid grid-cols-2 gap-2 mt-3">
            <button class="btn" id="fPrev">← Précédent</button>
            <button class="btn btn-primary" id="fNext">Suivant →</button>
          </div>
        </div>`);
      function r2(){
        const card = COURSE.flashcards[i];
        c.querySelector("#fI").textContent = i+1;
        c.querySelector("#fQ").textContent = card.q;
        c.querySelector("#fA").innerHTML = card.a;
        c.querySelector(".flash").classList.remove("flipped");
      }
      r2();
      c.querySelector(".flash").addEventListener("click", ()=> c.querySelector(".flash").classList.toggle("flipped"));
      c.querySelector("#fNext").addEventListener("click", ()=>{ i=(i+1)%COURSE.flashcards.length; r2(); });
      c.querySelector("#fPrev").addEventListener("click", ()=>{ i=(i-1+COURSE.flashcards.length)%COURSE.flashcards.length; r2(); });
      return c;
    },
    qcm: ()=>{
      let i = 0;
      const c = html(`<div id="qWrap"></div>`);
      function r2(){
        const q = COURSE.qcm[i];
        c.innerHTML = `
          <div class="flex items-center justify-between text-[12px] muted mb-2"><span><b class="ink">${i+1}</b>/${COURSE.qcm.length}</span><span>Niveau ${q.lvl}</span></div>
          <h3 class="serif text-xl font-semibold leading-snug">${q.q}</h3>
          <div class="grid gap-2 mt-3" id="o">
            ${q.o.map((o,k)=>`<button class="opt" data-k="${k}"><span class="key">${"ABCD"[k]}</span><span class="flex-1">${o}</span></button>`).join("")}
          </div>
          <div id="exp" class="hidden paper rounded-lg p-4 mt-3 text-[14px]"></div>
          <div class="flex gap-2 mt-3"><button class="btn" id="prev">← Préc.</button><button class="btn btn-primary flex-1" id="next">Suivant →</button></div>`;
        const opts = c.querySelectorAll("#o .opt");
        opts.forEach(b=>{
          b.addEventListener("click", ()=>{
            const k = +b.dataset.k;
            opts.forEach(o=>o.disabled=true);
            opts[k].classList.add(k===q.c?"correct":"wrong");
            if(k!==q.c) opts[q.c].classList.add("correct");
            const exp = c.querySelector("#exp"); exp.classList.remove("hidden");
            exp.innerHTML = `<div class="font-semibold mb-1" style="color:${k===q.c?'var(--ok)':'var(--bad)'}">${k===q.c?"✓ Correct":"✗ Faux"}</div>${q.e}`;
          });
        });
        c.querySelector("#next").addEventListener("click", ()=>{ i=(i+1)%COURSE.qcm.length; r2(); });
        c.querySelector("#prev").addEventListener("click", ()=>{ i=(i-1+COURSE.qcm.length)%COURSE.qcm.length; r2(); });
      }
      r2();
      return c;
    },
    libre: ()=>{
      let i = 0;
      const c = html(`<div></div>`);
      function r2(){
        const it = COURSE.libre[i];
        c.innerHTML = `
          <div class="flex items-center justify-between text-[12px] muted mb-2"><span><b class="ink">${i+1}</b>/${COURSE.libre.length}</span></div>
          <h3 class="serif text-xl font-semibold leading-snug">${it.q}</h3>
          <textarea id="ti" rows="4" class="w-full paper rounded-xl p-4 mt-3 focus-ring text-[15px]" placeholder="Réponds avec tes mots…" style="outline:none"></textarea>
          <div class="flex gap-2 mt-3"><button class="btn btn-primary" id="chk">Vérifier</button><button class="btn" id="see">Voir réponse</button><button class="btn ml-auto" id="next">Suivant →</button></div>
          <div id="fb" class="hidden paper rounded-lg p-4 mt-3 text-[14px]"></div>`;
        c.querySelector("#chk").addEventListener("click", ()=>{
          const v = normalize(c.querySelector("#ti").value);
          const found = it.kw.filter(k=> v.includes(normalize(k))).length;
          let lbl="✗ À retravailler", col="var(--bad)";
          if(found>=it.min){ lbl="✓ Validé"; col="var(--ok)"; }
          else if(found>=Math.max(1,it.min-1)){ lbl="≈ Partiel"; col="var(--warn)"; }
          const fb = c.querySelector("#fb"); fb.classList.remove("hidden");
          fb.innerHTML = `<div class="font-semibold mb-1" style="color:${col}">${lbl} · ${found}/${it.kw.length} mots-clés</div><div class="soft"><b>Modèle :</b> ${it.ideal}</div>`;
        });
        c.querySelector("#see").addEventListener("click", ()=>{
          const fb = c.querySelector("#fb"); fb.classList.remove("hidden");
          fb.innerHTML = `<div class="font-semibold mb-1" style="color:var(--accent)">Réponse modèle</div>${it.ideal}`;
        });
        c.querySelector("#next").addEventListener("click", ()=>{ i=(i+1)%COURSE.libre.length; r2(); });
      }
      r2();
      return c;
    },
    mnemo: ()=>{
      const c = html(`<div class="space-y-4"></div>`);
      c.appendChild(html(`<div><div class="text-[11px] uppercase tracking-[0.22em] muted mb-2">Pièges fréquents</div>
        <div class="space-y-2">${COURSE.pieges.map(p=>`<div class="paper rounded-xl p-4"><div class="font-semibold">⚠ ${p.t}</div><div class="text-[14px] soft mt-1 leading-relaxed">${p.d}</div></div>`).join("")}</div></div>`));
      c.appendChild(html(`<div><div class="text-[11px] uppercase tracking-[0.22em] muted mb-2">Mnémo</div>
        <div class="space-y-2">${COURSE.mnemos.map(m=>`<div class="paper rounded-xl p-4" style="background:var(--accent-soft); border-color:transparent"><div class="font-semibold">${m.t}</div><div class="text-[14px] soft mt-1 leading-relaxed">${m.d}</div></div>`).join("")}</div></div>`));
      return c;
    },
    mind: ()=>{
      const c = html(`<div></div>`);
      const W=540, H=440, cx=W/2, cy=H/2, R=160;
      const nodes = COURSE.essentials.slice(0,6);
      const pts = nodes.map((n,i)=>{
        const a = (i/nodes.length)*Math.PI*2 - Math.PI/2;
        return { ...n, x: cx+Math.cos(a)*R, y: cy+Math.sin(a)*R };
      });
      const svgNS = "http://www.w3.org/2000/svg";
      const svg = document.createElementNS(svgNS,"svg");
      svg.setAttribute("viewBox",`0 0 ${W} ${H}`);
      svg.setAttribute("class","w-full h-auto");
      pts.forEach(p=>{
        const ln = document.createElementNS(svgNS,"line");
        ln.setAttribute("x1",cx); ln.setAttribute("y1",cy);
        ln.setAttribute("x2",p.x); ln.setAttribute("y2",p.y);
        ln.setAttribute("stroke","currentColor"); ln.setAttribute("stroke-width","1"); ln.setAttribute("opacity",".25");
        svg.appendChild(ln);
      });
      const cc = document.createElementNS(svgNS,"circle");
      cc.setAttribute("cx",cx); cc.setAttribute("cy",cy); cc.setAttribute("r",50);
      cc.setAttribute("fill","var(--ink)");
      svg.appendChild(cc);
      const ct = document.createElementNS(svgNS,"text");
      ct.setAttribute("x",cx); ct.setAttribute("y",cy+5); ct.setAttribute("text-anchor","middle"); ct.setAttribute("fill","var(--bg)"); ct.setAttribute("font-family","Fraunces, serif"); ct.setAttribute("font-weight","600"); ct.setAttribute("font-size","16"); ct.textContent="Séq. 23";
      svg.appendChild(ct);
      pts.forEach(p=>{
        const g = document.createElementNS(svgNS,"g");
        g.style.cursor="pointer";
        const r2 = document.createElementNS(svgNS,"circle");
        r2.setAttribute("cx",p.x); r2.setAttribute("cy",p.y); r2.setAttribute("r",36);
        r2.setAttribute("fill","var(--paper)"); r2.setAttribute("stroke","var(--ink)"); r2.setAttribute("stroke-width","1.5");
        g.appendChild(r2);
        const t = document.createElementNS(svgNS,"text");
        t.setAttribute("x",p.x); t.setAttribute("y",p.y+4); t.setAttribute("text-anchor","middle"); t.setAttribute("fill","var(--ink)"); t.setAttribute("font-family","Inter, sans-serif"); t.setAttribute("font-weight","600"); t.setAttribute("font-size","11");
        const words = p.t.split(" ");
        if(words.length>1){
          const a = document.createElementNS(svgNS,"tspan"); a.setAttribute("x",p.x); a.setAttribute("dy","-3"); a.textContent=words.slice(0,Math.ceil(words.length/2)).join(" ");
          const b = document.createElementNS(svgNS,"tspan"); b.setAttribute("x",p.x); b.setAttribute("dy","12"); b.textContent=words.slice(Math.ceil(words.length/2)).join(" ");
          t.appendChild(a); t.appendChild(b);
        } else t.textContent = p.t;
        g.appendChild(t);
        g.addEventListener("click", ()=> openModal(p.tag, p.t, md(p.d)));
        svg.appendChild(g);
      });
      const wrap = html(`<div class="paper rounded-xl p-3"></div>`);
      wrap.appendChild(svg);
      c.appendChild(wrap);
      c.appendChild(html(`<p class="text-[12px] muted mt-2">Clique un nœud pour le détail.</p>`));
      return c;
    }
  };

  box.appendChild(r[S.toolsTab]());
  return el;
}

applyTheme();
applySound();
$("#streakNum").textContent = S.streak.count;
// Init voices early on iOS Safari (lazy load)
if(typeof speechSynthesis !== "undefined") setTimeout(()=>{ try{ speechSynthesis.getVoices(); }catch{} }, 200);
render();
</script>
