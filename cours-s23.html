<style>
  :root{
    --bg:#0b0f1a; --bg-2:#0f1424; --panel:#121831; --panel-2:#161d3a;
    --line:#23284a; --line-2:#2d335f;
    --text:#e8ecff; --muted:#9aa3c7; --soft:#c3c9eb;
    --p1:#7c5cff; --p2:#22d3ee; --p3:#f472b6; --p4:#facc15; --p5:#34d399;

  }
  [data-theme="light"]{
    --bg:#f6f7fb; --bg-2:#eef0f8; --panel:#ffffff; --panel-2:#f3f5fc;
    --line:#e2e5f1; --line-2:#cfd4ea;
    --text:#0b1020; --muted:#5b6280; --soft:#3a4068;
  }
  *{ -webkit-tap-highlight-color: transparent; }
  html,body{ background:var(--bg); color:var(--text); font-family:'Plus Jakarta Sans',ui-sans-serif,system-ui,sans-serif; }
  .mono{ font-family:'JetBrains Mono',ui-monospace,monospace; }
  .glass{ background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01)); backdrop-filter: blur(8px); }
  [data-theme="light"] .glass{ background:linear-gradient(180deg, rgba(255,255,255,.85), rgba(255,255,255,.65)); }
  .panel{ background:var(--panel); border:1px solid var(--line); border-radius:18px; }
  .panel-2{ background:var(--panel-2); border:1px solid var(--line); border-radius:14px; }
  .grad-text{ background:var(--grad); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .grad-bg{ background:var(--grad); }
  .ring-grad{ position:relative; }
  .ring-grad::before{ content:""; position:absolute; inset:-1px; border-radius:inherit; padding:1px; background:var(--grad); -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0); -webkit-mask-composite: xor; mask-composite: exclude; pointer-events:none; }
  .btn{ min-height:44px; padding:0 16px; border-radius:12px; display:inline-flex; align-items:center; justify-content:center; gap:8px; font-weight:600; border:1px solid var(--line-2); background:var(--panel-2); color:var(--text); transition:transform .15s ease, background .2s ease, border-color .2s ease, box-shadow .2s ease; }
  .btn:hover{ transform:translateY(-1px); border-color:#3a4180; }
  .btn:active{ transform:translateY(0); }
  .btn-primary{ background:var(--grad); border:none; color:#0b0f1a; box-shadow:var(--shadow); }
  [data-theme="light"] .btn-primary{ color:#0b1020; }
  .btn-ghost{ background:transparent; }
  .chip{ display:inline-flex; align-items:center; gap:6px; padding:6px 10px; border-radius:999px; font-size:12px; border:1px solid var(--line-2); background:var(--panel-2); color:var(--soft); }
  .chip.on{ background:var(--grad); color:#0b0f1a; border:none; }
  .card-hover{ transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease; }
  .card-hover:hover{ transform:translateY(-3px); border-color:var(--line-2); box-shadow:var(--shadow); }
  .progress-track{ background:linear-gradient(90deg,#1a2042,#1a2042); border-radius:999px; overflow:hidden; }
  [data-theme="light"] .progress-track{ background:#e6e9f6; }
  .progress-fill{ height:100%; background:var(--grad); transition:width .5s cubic-bezier(.2,.8,.2,1); }
  .flash{ perspective:1200px; }
  .flash-inner{ transition: transform .6s cubic-bezier(.2,.8,.2,1); transform-style:preserve-3d; position:relative; }
  .flash.flipped .flash-inner{ transform: rotateY(180deg); }
  .flash-face{ backface-visibility:hidden; -webkit-backface-visibility:hidden; }
  .flash-back{ transform: rotateY(180deg); position:absolute; inset:0; }
  .swipe-hint{ opacity:.0; transition:opacity .2s ease; }
  .flash.dragging .swipe-hint{ opacity:1; }
  .scroll-snap{ scroll-snap-type:x mandatory; }
  .snap-item{ scroll-snap-align:center; }
  details>summary{ list-style:none; cursor:pointer; }
  details>summary::-webkit-details-marker{ display:none; }
  .node{ cursor:pointer; transition: transform .2s ease, filter .2s ease; }
  .node:hover{ transform: scale(1.05); filter: brightness(1.15); }
  .pulse{ animation:pulse 2.4s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{ box-shadow:0 0 0 0 rgba(124,92,255,.5); } 50%{ box-shadow:0 0 0 12px rgba(124,92,255,0); } }
  .shake{ animation:shake .35s linear; }
  @keyframes shake{ 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
  .pop{ animation: pop .35s cubic-bezier(.2,.8,.2,1); }
  @keyframes pop{ 0%{ transform:scale(.92); opacity:0 } 100%{ transform:scale(1); opacity:1 } }
  .fade{ animation: fade .35s ease; }
  @keyframes fade{ from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:none} }
  .confetti{ position:fixed; width:8px; height:14px; top:-20px; pointer-events:none; border-radius:2px; }
  /* scrollbar */
  ::-webkit-scrollbar{ width:10px; height:10px; }
  ::-webkit-scrollbar-thumb{ background:#2a3160; border-radius:999px; }
  ::-webkit-scrollbar-track{ background:transparent; }
  [data-theme="light"] ::-webkit-scrollbar-thumb{ background:#c3c8e0; }
  /* Mind map */
  .mm-svg text{ fill:var(--text); font-weight:600; }
  .mm-svg .edge{ stroke:url(#mmgrad); stroke-width:2; opacity:.7; }
  .mm-svg .node-circle{ filter: drop-shadow(0 6px 18px rgba(124,92,255,.35)); }
  /* Sticky nav */
  .navbar{ position:sticky; top:0; z-index:30; backdrop-filter: blur(14px); background: color-mix(in oklab, var(--bg) 75%, transparent); border-bottom:1px solid var(--line); }
  .tab{ flex:1; display:flex; align-items:center; justify-content:center; gap:6px; padding:10px 8px; border-radius:12px; min-height:48px; color:var(--muted); font-weight:600; font-size:12px; text-align:center; }
  .tab.active{ color:var(--text); background:var(--panel-2); }
  .tab.active svg{ color:#7c5cff; }
  @media (min-width: 768px){ .tab{ font-size:13px; padding:12px 10px; } }
  /* QCM option */
  .opt{ width:100%; text-align:left; padding:14px 16px; border-radius:14px; border:1px solid var(--line); background:var(--panel-2); display:flex; align-items:center; gap:12px; min-height:56px; transition:all .2s ease; }
  .opt:hover{ border-color:var(--line-2); transform:translateY(-1px); }
  .opt .dot{ width:22px; height:22px; border-radius:50%; border:2px solid var(--line-2); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:var(--muted); }
  .opt.correct{ border-color:#34d399; background:rgba(52,211,153,.08); }
  .opt.correct .dot{ background:#34d399; border-color:#34d399; color:#0b1020; }
  .opt.wrong{ border-color:#f87171; background:rgba(248,113,113,.08); }
  .opt.wrong .dot{ background:#f87171; border-color:#f87171; color:#0b1020; }
  .opt:disabled{ cursor:default; }
  /* Tooltip */
  .kw{ background:linear-gradient(180deg, rgba(124,92,255,.15), rgba(34,211,238,.12)); border-bottom:1px dashed #7c5cff; padding:1px 4px; border-radius:6px; cursor:help; font-weight:600; }
  .kw:hover{ background:linear-gradient(180deg, rgba(124,92,255,.28), rgba(34,211,238,.22)); }
  /* Modal */
  .modal-bg{ position:fixed; inset:0; background:rgba(5,7,18,.7); backdrop-filter: blur(6px); z-index:50; display:none; align-items:center; justify-content:center; padding:16px; }
  .modal-bg.open{ display:flex; }
  .modal{ max-width:520px; width:100%; max-height:80vh; overflow:auto; }
  /* Range / timer ring */
  .ring{ transform: rotate(-90deg); transform-origin:center; }
  /* Light-mode contrast fixes for buttons */
  [data-theme="light"] .btn-primary{ color:#fff !important; }
  [data-theme="light"] .chip.on{ color:#fff; }
  [data-theme="light"] .opt.correct{ background:rgba(52,211,153,.15); }
  [data-theme="light"] .opt.wrong{ background:rgba(248,113,113,.15); }
  /* Hidden but accessible */
  .sr-only{ position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }
</style>

<script>
/* =====================================================================
   DATA — Cours Séquence 23 : Intégrer une dimension design à l'objet
   (CT 2.5 / CT 2.6) — Cycle 4
===================================================================== */
const COURSE = {
  title: "Intégrer une dimension design à l'objet",
  meta: "Séquence n°23 · Cycle 4 · Technologie",
  competences: ["CT 2.5 — Imaginer des solutions en réponse au besoin", "CT 2.6 — Réaliser, de manière collaborative, le prototype de tout ou partie d'un objet pour valider une solution."],
  durations: { lecture: 25, flashcards: 12, qcm: 15, libre: 10, examen: 15 },
  objectifs: [
    "Distinguer travail coopératif et travail collaboratif.",
    "Identifier les 4 rôles types d'un groupe de projet.",
    "Définir précisément une maquette (réelle / numérique) et son rôle.",
    "Comprendre le prototypage rapide (imprimante 3D, fraiseuse numérique).",
    "Différencier fabrication par addition et par enlèvement de matière.",
    "Expliquer ce qu'est un Fablab et la chaîne CAO → fichier de fabrication."
  ],

  /* ---------- KEYWORDS (pop-up définitions) ---------- */
  keywords: {
    "objectif commun":"But partagé par tous les membres d'un groupe de projet ; il oriente l'organisation et la communication.",
    "implication":"Engagement de tous les participants : sans cela, le projet échoue malgré une bonne idée.",
    "organisation":"Répartition des tâches, des rôles et du temps pour atteindre l'objectif dans les délais.",
    "communication":"Échange d'informations entre les participants (oral, écrit, schémas) ; conditionne la réussite.",
    "coopératif":"Mode de travail où chacun s'occupe d'une tâche indépendante des autres ; on additionne les contributions.",
    "collaboratif":"Mode de travail où tous travaillent en même temps sur la même tâche ; on co-construit ensemble.",
    "coordonnateur":"Rôle : veille au bon fonctionnement du groupe et anime les débats (aussi appelé animateur).",
    "secrétaire":"Rôle : note les idées, rédige le compte-rendu écrit et gère le dossier du groupe.",
    "rapporteur":"Rôle : présente à l'oral le travail du groupe (synthèse classe entière) ; interlocuteur privilégié du prof.",
    "gestionnaire":"Rôle : gère le matériel, les ordinateurs et le temps du groupe.",
    "groupe de projet":"Plusieurs personnes organisées avec différents rôles pour réussir un projet commun.",
    "maquette":"Représentation en 3D, à échelle réduite mais fidèle dans ses proportions et son aspect. Réelle ou numérique.",
    "maquette numérique":"Maquette créée grâce à une application de C.A.O. — permet des simulations (efforts, séismes, aérodynamisme…).",
    "maquette réelle":"Maquette physique, manipulable (ex. : pont de Rouen en modèle réduit).",
    "maquette structurelle":"Maquette qui montre la structure, l'organisation, l'agencement d'un ouvrage ou bâtiment.",
    "C.A.O.":"Conception Assistée par Ordinateur : logiciel permettant de modéliser un objet en 3D.",
    "garde-fou":"Rôle de la maquette : prévenir un mauvais fonctionnement ou une inadéquation entre théorie et réalité.",
    "validation":"Rôle de la maquette : confirmer que la solution retenue est valable avant fabrication finale.",
    "prototype":"Premier exemplaire d'un objet (complet ou partiel) servant à tester et valider des solutions.",
    "prototypage rapide":"Fabrication rapide, à faible coût, d'une pièce (maquette, prototype, outillage) avec un minimum d'étapes.",
    "imprimante 3D":"Machine qui fabrique par addition de matière : une buse dépose un filament fondu, couche par couche, de bas en haut.",
    "fraiseuse numérique":"Machine-outil à commande numérique qui fabrique par enlèvement de matière à partir d'un bloc.",
    "addition de matière":"Procédé qui ajoute de la matière (ex. : impression 3D) — construction de bas en haut.",
    "enlèvement de matière":"Procédé qui retire de la matière d'un bloc brut (ex. : fraisage, usinage).",
    "MOCN":"Machine-Outil à Commande Numérique : pilotée par ordinateur, comme la fraiseuse numérique.",
    "Fablab":"Contraction de « fabrication laboratory » : lieu ouvert au public avec outils, machines à commande numérique, électronique, pour concevoir et fabriquer.",
    "fichier de fabrication":"Fichier final exporté de la CAO, paramétré, lu par la machine pour produire la pièce.",
    "paramétrage":"Réglages (matériau, épaisseur, vitesse…) faits avant la conversion en fichier de fabrication.",
    "filament":"Fil de plastique fondu par la buse de l'imprimante 3D pour construire la pièce.",
    "buse":"Embout de la tête d'impression qui dépose le filament fondu.",
    "outil de coupe":"Outil rotatif de la fraiseuse qui usine la matière (taille dans la masse).",
    "cahier des charges":"Document qui formalise le besoin et les contraintes auxquels la solution doit répondre.",
    "croquis":"Schéma rapide à main levée traduisant une idée ou une solution technique.",
    "schéma":"Représentation simplifiée, normée, expliquant le fonctionnement ou l'organisation d'un objet."
  },

  /* ---------- SYNTHÈSE 3 NIVEAUX ---------- */
  synthese: {
    tldr: [
      "Un projet réussit avec un **objectif commun**, une bonne **organisation** et une **communication** entre tous.",
      "On distingue **coopération** (tâches séparées) et **collaboration** (même tâche, ensemble).",
      "4 rôles types : **coordonnateur**, **secrétaire**, **rapporteur**, **gestionnaire**.",
      "Une **maquette** = représentation 3D à échelle réduite, fidèle, **réelle** ou **numérique (C.A.O.)**.",
      "Le **prototypage rapide** (imprimante 3D ou fraiseuse numérique) valide rapidement une solution.",
      "Imprimante 3D = **addition** de matière. Fraiseuse = **enlèvement** de matière.",
      "Un **Fablab** est un lieu public d'outils et de machines pour concevoir et fabriquer."
    ],
    resume: `
      <p>Pour réussir un projet, on constitue un **groupe de projet** : plusieurs personnes qui partagent un **objectif commun**. Trois conditions sont indispensables : l'**implication de tous**, une bonne **organisation** et une **communication** efficace entre les participants.</p>
      <p>Deux modes de travail coexistent. En **coopération**, chacun s'occupe d'une tâche **indépendante**. En **collaboration**, tous travaillent **en même temps sur la même tâche**. Le groupe se répartit ensuite 4 rôles clés : le **coordonnateur** (anime), le **secrétaire** (écrit), le **rapporteur** (présente) et le **gestionnaire** (matériel + temps).</p>
      <p>La **maquette** est une représentation en **3 dimensions** à échelle réduite, **fidèle** dans ses proportions et son aspect. Elle peut être **réelle** (manipulable) ou **numérique** (faite en **C.A.O.**, Conception Assistée par Ordinateur). Elle joue trois rôles : **garde-fou** (détecter une erreur de conception), **validation** des solutions, et support de **simulations** (efforts, séismes, usure, aérodynamisme).</p>
      <p>Le **prototypage rapide** consiste à fabriquer rapidement, à faible coût, un premier exemplaire de la pièce. Deux principes : l'**imprimante 3D** ajoute la matière couche par couche (**addition**), la **fraiseuse numérique** retire la matière d'un bloc (**enlèvement**). Dans les deux cas : on part d'un **modèle CAO**, on l'**exporte**, on le **paramètre**, on le **convertit en fichier de fabrication**.</p>
      <p>Le **Fablab** — *fabrication laboratory* — est un lieu **ouvert au public** mettant à disposition logiciels 3D, MOCN, petit outillage et électronique pour concevoir et fabriquer.</p>
    `,
    complet: `
      <h4 class="font-bold text-base mt-2">I — Organisation d'un groupe de projet</h4>
      <p>Pour réussir un projet, on met en place un **groupe de projet** constitué d'un ensemble de personnes qui ont un **objectif commun**. Cela nécessite **une implication de tous**, **une bonne organisation** et **une bonne communication** entre tous les participants.</p>
      <p>Pour respecter les délais, on travaille selon <strong>2 organisations possibles</strong> :</p>
      <ul class="list-disc pl-5 space-y-1">
        <li><strong>Le travail coopératif</strong> : chacun s'occupe d'une tâche **indépendante** des autres.</li>
        <li><strong>Le travail collaboratif</strong> : chacun travaille en **même temps sur une même tâche**.</li>
      </ul>
      <p>L'organisation retenue implique que dans chaque groupe (îlot), chaque participant a un rôle précis. Exemple de **4 rôles possibles** :</p>
      <ul class="list-disc pl-5 space-y-1">
        <li><strong>Le coordonnateur (ou animateur)</strong> : veille au bon fonctionnement du groupe et anime les débats.</li>
        <li><strong>Le secrétaire</strong> : note les idées, fait le compte-rendu à l'écrit, gère le dossier du groupe.</li>
        <li><strong>Le rapporteur</strong> : présente à l'oral le travail du groupe (synthèse classe entière) ; interlocuteur privilégié du professeur.</li>
        <li><strong>Le gestionnaire</strong> : gère le matériel, les ordinateurs et la durée du travail.</li>
      </ul>
      <p class="panel-2 p-3 mt-2"><em>À retenir :</em> on appelle <strong>groupe de projet</strong> plusieurs personnes qui s'organisent avec différents rôles pour travailler ensemble dans le but de réussir un projet commun. Les participants peuvent soit **coopérer** (partage des tâches) soit **collaborer** (même tâche pour tous).</p>

      <h4 class="font-bold text-base mt-4">II — La maquette</h4>
      <p><strong>Maquette</strong> : représentation en **trois dimensions**, à **échelle réduite** mais **fidèle** dans ses proportions et son aspect. Elle peut être **numérique** (grâce à une application **C.A.O.**) ou **réelle**.</p>
      <p><strong>C.A.O.</strong> = **Conception Assistée par Ordinateur**.</p>
      <ul class="list-disc pl-5 space-y-1">
        <li>Elle joue un rôle de **garde-fou** contre un éventuel **mauvais fonctionnement** ou une **inadéquation** entre le modèle théorique et sa réalisation physique.</li>
        <li>Elle a un rôle de **validation des solutions retenues**.</li>
        <li>Les versions informatiques permettent de **simuler** : forces, tremblements de terre, passage de véhicules, usure, environnement…</li>
      </ul>
      <p>Lorsqu'elle permet de montrer la structure, l'organisation, l'agencement d'un ouvrage ou bâtiment, on l'appelle **maquette structurelle**.</p>
      <p><em>Exemples : maquette réelle du pont de Rouen ; maquette numérique d'une voiture avec étude aérodynamique.</em></p>

      <h4 class="font-bold text-base mt-4">III — Prototypage rapide de structures</h4>
      <p>Pour réaliser rapidement un prototype, on utilise une **imprimante 3D** ou une **fraiseuse numérique**. C'est une **phase déterminante** pour valider ou rectifier le projet.</p>
      <p>La fabrication d'une pièce (maquette, prototype, outillage), manipulable, dans un **délai très court**, à **faible coût**, s'appelle le **prototypage rapide de structures**. La rapidité est due à un **minimum d'outillages et d'étapes**.</p>
      <p><strong>Imprimante 3D — fabrication par addition de matière :</strong> une tête d'impression comprenant une ou plusieurs **buses** se déplace au-dessus d'un plateau. Les buses entraînent un **filament** **fondu** déposé sur le plateau. La pièce se construit **de bas en haut**, sous **contrôle ordinateur**.</p>
      <p><strong>Fraiseuse numérique — fabrication par enlèvement de matière :</strong> machine-outil à commande numérique, **automatisée et contrôlée par ordinateur**. L'**usinage** consiste à enlever de la matière pour **tailler dans la masse** selon les fichiers enregistrés, jusqu'à obtenir la pièce finie.</p>
      <p class="panel-2 p-3 mt-2"><em>Chaîne numérique commune :</em> <strong>modèle CAO → export</strong> dans un format accepté → <strong>paramétrage</strong> → <strong>conversion en fichier de fabrication</strong> → fabrication.</p>

      <h4 class="font-bold text-base mt-4">IV — Le Fablab</h4>
      <p>Contraction de l'anglais <em>fabrication laboratory</em>, le **Fablab** est un lieu **ouvert au public** où l'on met à disposition **toutes sortes d'outils**, notamment des **machines-outils pilotées par ordinateur**, pour la **conception** et la **réalisation** d'objets. Il inclut : logiciels de modélisation 3D, machines à commande numérique, machines-outils, petit outillage, matériel électronique, et favorise **partage & collaboration**.</p>

const STORAGE_KEY = "seq23-v1";
const defaultState = {
  theme:"dark",
  tab:"home",
  progress:{ synth:false, flash:0, qcm:0, libre:0, mind:false, mnemo:false, exam:0 },
  flash:{ known:[], review:[], idx:0 },
  qcm:{ done:[], correct:[], wrong:[], onlyWrong:false },
  libre:{ done:[], scores:{} },
  exam:{ best:0, last:0, history:[] },
  streak:{ count:0, lastDay:null }
};
let S = load();

function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return structuredClone(defaultState);
    const obj = JSON.parse(raw);
    return Object.assign(structuredClone(defaultState), obj);
  }catch(e){ return structuredClone(defaultState); }
}
function save(){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(S)); }catch(e){} updateGlobalProgress(); }

function bumpStreak(){
  const today = new Date().toISOString().slice(0,10);
  if(S.streak.lastDay === today) return;
  if(S.streak.lastDay){
    const last = new Date(S.streak.lastDay), now = new Date(today);
    const diff = Math.round((now - last) / 86400000);
    S.streak.count = diff === 1 ? S.streak.count + 1 : 1;
  } else S.streak.count = 1;
  S.streak.lastDay = today;
  save();
  $("#streakNum").textContent = S.streak.count;
}

function injectKw(text){
  // Replace keywords on word boundaries
  const keys = Object.keys(COURSE.keywords).sort((a,b)=>b.length-a.length);
  let out = text;
  keys.forEach(k=>{
    const esc = k.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    const re = new RegExp(`(^|[^a-zA-ZàâäéèêëîïôöùûüçÀÂÄÉÈÊËÎÏÔÖÙÛÜÇ_-])(${esc})(?![a-zA-ZàâäéèêëîïôöùûüçÀÂÄÉÈÊËÎÏÔÖÙÛÜÇ_-])`, "i");
    out = out.replace(re, (m,p1,p2)=> `${p1}<span class="kw" data-kw="${k.toLowerCase()}">${p2}</span>`);
  });
  return out;
}
function mdLite(s){
  return s.replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>")
          .replace(/__(.+?)__/g,"<em>$1</em>");
}

/* =====================================================================
   GLOBAL PROGRESS
===================================================================== */
function updateGlobalProgress(){
  // synth done if user viewed any
  const p = S.progress;
  const synth = p.synth ? 1 : 0;
  const flash = COURSE.flashcards.length ? Math.min(S.flash.known.length / COURSE.flashcards.length, 1) : 0;
  const qcm   = COURSE.qcm.length ? Math.min(S.qcm.done.length / COURSE.qcm.length, 1) : 0;
  const libre = COURSE.libre.length ? Math.min(S.libre.done.length / COURSE.libre.length, 1) : 0;
  const mind  = p.mind ? 1 : 0;
  const mnemo = p.mnemo ? 1 : 0;
  const exam  = Math.min((S.exam.best||0)/20, 1);
  const total = (synth+flash+qcm+libre+mind+mnemo+exam)/7;
  const pct = Math.round(total*100);
  $$(".global-pct").forEach(el=> el.textContent = pct + "%");
  $$(".global-fill").forEach(el=> el.style.width = pct + "%");
  return { pct, parts:{synth,flash,qcm,libre,mind,mnemo,exam} };
}

function viewFlash(){
  const el = html(`<section class="space-y-4"></section>`);

  el.appendChild(html(`

        <button class="btn btn-ghost" id="fReset">Reset</button>
      </div>
    </div>
  `));

  el.appendChild(html(`
    <div class="panel p-3">
      <div class="flex items-center justify-between text-xs text-[color:var(--muted)] mb-1.5">
        <span>Carte <b id="fIdx">1</b> / ${total}</span>
        <span><b id="fPct">0%</b> du paquet</span>
      </div>
      <div class="h-2 progress-track"><div id="fFill" class="progress-fill" style="width:0%"></div></div>
    </div>
  `));

  const card = html(`
    <div class="panel p-1">
      <div id="flashCard" class="flash relative h-72 md:h-80 select-none" tabindex="0">
        <div class="flash-inner w-full h-full">
          <div class="flash-face panel-2 w-full h-full p-6 md:p-8 flex flex-col items-center justify-center text-center rounded-2xl border border-[color:var(--line-2)]">
            <div class="text-xs uppercase tracking-widest text-[color:var(--muted)] mb-2">Question</div>
            <div id="flashQ" class="text-xl md:text-2xl font-bold leading-snug max-w-2xl"></div>
            <div class="absolute bottom-3 text-[11px] text-[color:var(--muted)]">Tap pour retourner</div>
            <div class="swipe-hint absolute left-3 top-3 chip" style="background:rgba(248,113,113,.15);color:#fca5a5;border-color:#7f1d1d">← à revoir</div>
            <div class="swipe-hint absolute right-3 top-3 chip" style="background:rgba(52,211,153,.15);color:#86efac;border-color:#065f46">je sais →</div>
          </div>
          <div class="flash-face flash-back panel-2 w-full h-full p-6 md:p-8 flex flex-col items-center justify-center text-center rounded-2xl border border-[color:var(--line-2)] ring-grad">
            <div class="text-xs uppercase tracking-widest text-[color:var(--muted)] mb-2">Réponse</div>
            <div id="flashA" class="text-base md:text-xl leading-relaxed max-w-2xl"></div>
          </div>
        </div>
      </div>
    </div>
  `);
  el.appendChild(card);

  el.appendChild(html(`
    <div class="grid grid-cols-3 gap-2">
      <button class="btn" id="fRevoir" style="border-color:#7f1d1d;color:#fca5a5;">${ic("cards",16)} À revoir</button>
      <button class="btn" id="fFlip">Retourner</button>
      <button class="btn" id="fSais" style="border-color:#065f46;color:#86efac;">Je sais ${ic("cards",16)}</button>
    </div>
  `));

  function deckOrder(){
    const all = COURSE.flashcards.map((_,i)=>i);
    const review = all.filter(i => S.flash.review.includes(i));
    const fresh  = all.filter(i => !S.flash.known.includes(i) && !S.flash.review.includes(i));
    const known  = all.filter(i => S.flash.known.includes(i));
    return [...review, ...fresh, ...known];
  }
  function currentIdx(){
    const order = deckOrder();
    if(!order.length) return 0;
    return order[Math.min(S.flash.idx, order.length-1)];
  }
  function render(){
    const order = deckOrder();
    const pos = Math.min(S.flash.idx, order.length-1);
    const idx = order[pos] ?? 0;
    const c = COURSE.flashcards[idx];
    const f = $("#flashCard", el);
    f.classList.remove("flipped");
    $("#flashQ", el).textContent = c.q;
    $("#flashA", el).innerHTML = c.a;
    $("#fIdx", el).textContent = (pos+1);
    const pct = Math.round((S.flash.known.length/total)*100);
    $("#fPct", el).textContent = pct + "%";
    $("#fFill", el).style.width = pct + "%";
    $("#fStatK", el).textContent = S.flash.known.length;
    $("#fStatR", el).textContent = S.flash.review.length;
  }
  function mark(known){
    const order = deckOrder();
    const idx = order[Math.min(S.flash.idx, order.length-1)];
    if(known){
      if(!S.flash.known.includes(idx)) S.flash.known.push(idx);
      S.flash.review = S.flash.review.filter(i=>i!==idx);
    } else {
      if(!S.flash.review.includes(idx)) S.flash.review.push(idx);
      S.flash.known = S.flash.known.filter(i=>i!==idx);
    }
    S.flash.idx = (S.flash.idx + 1);
    if(S.flash.idx >= order.length) S.flash.idx = 0;
    save();
    bumpStreak();
    render();
    if(S.flash.known.length === total) celebrate();
  }

  render();

  // Interactions
  const f = $("#flashCard", el);
  f.addEventListener("click", e=>{ if(e.target.closest("button")) return; f.classList.toggle("flipped"); });
  $("#fFlip", el).addEventListener("click", ()=> f.classList.toggle("flipped"));
  $("#fSais", el).addEventListener("click", ()=> mark(true));
  $("#fRevoir", el).addEventListener("click", ()=> mark(false));
  $("#fReset", el).addEventListener("click", ()=>{ S.flash = {known:[],review:[],idx:0}; save(); render(); });

  // Swipe
  let startX=0, dx=0, dragging=false;
  function down(x){ startX=x; dx=0; dragging=true; f.classList.add("dragging"); f.style.transition="none"; }
  function move(x){ if(!dragging) return; dx = x - startX; f.style.transform = `translateX(${dx}px) rotate(${dx/20}deg)`; }
  function up(){
    if(!dragging) return;
    dragging=false; f.classList.remove("dragging"); f.style.transition="";
    if(Math.abs(dx)>90){
      const dir = dx>0;
      f.style.transform = `translateX(${dir?500:-500}px) rotate(${dir?30:-30}deg)`;
      setTimeout(()=>{ f.style.transform=""; mark(dir); }, 200);
    } else { f.style.transform=""; }
  }
  f.addEventListener("touchstart", e=>down(e.touches[0].clientX), {passive:true});
  f.addEventListener("touchmove",  e=>move(e.touches[0].clientX),  {passive:true});
  f.addEventListener("touchend",   up);
  f.addEventListener("mousedown",  e=>down(e.clientX));
  window.addEventListener("mousemove", e=>move(e.clientX));
  window.addEventListener("mouseup", up);

  // Keyboard
  f.addEventListener("keydown", e=>{
    if(e.key===" "||e.key==="Enter"){ e.preventDefault(); f.classList.toggle("flipped"); }
    if(e.key==="ArrowRight") mark(true);
    if(e.key==="ArrowLeft") mark(false);
  });

  return el;
}

/* ===================== VIEW: QCM ===================== */
function viewQcm(){
  const el = html(`<section class="space-y-4"></section>`);
  el.appendChild(html(`
    <div class="flex items-center justify-between flex-wrap gap-3">
      <div>
        <h2 class="text-2xl font-extrabold">QCM adaptatif</h2>
        <p class="text-[color:var(--muted)] text-sm">${COURSE.qcm.length} questions · difficulté progressive · explication après chaque réponse.</p>
      </div>
      <div class="flex flex-wrap gap-2">
        <button class="btn btn-ghost" id="qReset">Recommencer</button>
        <button class="btn ${S.qcm.onlyWrong?'btn-primary':''}" id="qOnlyWrong">${S.qcm.onlyWrong?"Tout":"Erreurs uniquement"}</button>
      </div>
    </div>
  `));

  const stats = html(`
    <div class="panel p-3">
      <div class="flex items-center justify-between text-xs text-[color:var(--muted)] mb-1.5">
        <span>Question <b id="qPos">1</b> / <b id="qTot">${COURSE.qcm.length}</b></span>
        <span>Score : <b id="qScore">${S.qcm.correct.length}</b>/<b id="qDone">${S.qcm.done.length}</b></span>
      </div>
      <div class="h-2 progress-track"><div id="qFill" class="progress-fill" style="width:0%"></div></div>
    </div>
  `);
  el.appendChild(stats);

  const qBox = html(`<div id="qBox" class="panel p-5 md:p-6 space-y-4"></div>`);
  el.appendChild(qBox);

  function deck(){
    const list = COURSE.qcm.map((q,i)=>({...q,i})).sort((a,b)=>a.lvl-b.lvl);
    if(S.qcm.onlyWrong) return list.filter(x=>S.qcm.wrong.includes(x.i));
    return list;
  }
  let pos = 0;

  function renderQ(){
    const d = deck();
    if(d.length===0){
      qBox.innerHTML = `<div class="text-center py-10"><div class="text-5xl mb-3">🎯</div><h3 class="font-bold text-xl">Plus d'erreurs à corriger !</h3><p class="text-[color:var(--muted)] mt-1">Bascule sur « Tout » pour reprendre l'ensemble.</p></div>`;
      return;
    }
    if(pos>=d.length) pos = d.length-1;
    const it = d[pos];
    $("#qPos",el).textContent = pos+1;
    $("#qTot",el).textContent = d.length;
    $("#qScore",el).textContent = S.qcm.correct.length;
    $("#qDone",el).textContent = S.qcm.done.length;
    $("#qFill",el).style.width = Math.round((S.qcm.done.length/COURSE.qcm.length)*100) + "%";
    const lvlTxt = ["Facile","Moyen","Difficile"][it.lvl-1] || "—";
    qBox.innerHTML = `
      <div class="flex items-center gap-2 text-xs"><span class="chip">${lvlTxt}</span>${S.qcm.wrong.includes(it.i)?'<span class="chip" style="background:rgba(248,113,113,.12);color:#fca5a5">déjà raté</span>':''}</div>
      <h3 class="font-bold text-lg md:text-xl">${it.q}</h3>
      <div class="grid gap-2" id="qOpts">
        ${it.o.map((opt,k)=>`<button class="opt" data-k="${k}"><span class="dot">${String.fromCharCode(65+k)}</span><span class="flex-1">${opt}</span></button>`).join("")}
      </div>
      <div id="qExp" class="hidden panel-2 p-4 text-sm leading-relaxed"></div>
      <div class="flex justify-between gap-2">
        <button class="btn" id="qPrev">${ic("home",14)} Précédent</button>
        <button class="btn btn-primary" id="qNext" disabled>Suivant ${ic("cards",14)}</button>
      </div>
    `;
    $$("#qOpts .opt", qBox).forEach(b=>{
      b.addEventListener("click", ()=> answer(it, +b.dataset.k));
    });
    $("#qNext", qBox).addEventListener("click", ()=>{ pos=Math.min(pos+1, deck().length-1); renderQ(); });
    $("#qPrev", qBox).addEventListener("click", ()=>{ pos=Math.max(0,pos-1); renderQ(); });
  }

  function answer(it, k){
    const opts = $$("#qOpts .opt", qBox);
    opts.forEach(o=>o.disabled=true);
    const correct = it.c;
    opts[k].classList.add(k===correct?"correct":"wrong");
    if(k!==correct){ opts[correct].classList.add("correct"); $("#qBox", el).classList.add("shake"); setTimeout(()=>$("#qBox", el).classList.remove("shake"),350); }
    // update state
    if(!S.qcm.done.includes(it.i)) S.qcm.done.push(it.i);
    if(k===correct){
      if(!S.qcm.correct.includes(it.i)) S.qcm.correct.push(it.i);
      S.qcm.wrong = S.qcm.wrong.filter(x=>x!==it.i);
    } else {
      if(!S.qcm.wrong.includes(it.i)) S.qcm.wrong.push(it.i);
      S.qcm.correct = S.qcm.correct.filter(x=>x!==it.i);
    }
    save();
    bumpStreak();
    const exp = $("#qExp", qBox);
    exp.classList.remove("hidden");
    exp.innerHTML = `<div class="font-bold mb-1 ${k===correct?'text-[#34d399]':'text-[#f87171]'}">${k===correct?"✓ Bonne réponse":"✗ Mauvaise réponse"}</div><div>${it.e}</div>`;
    $("#qNext", qBox).disabled = false;
    $("#qScore",el).textContent = S.qcm.correct.length;
    $("#qDone",el).textContent = S.qcm.done.length;
    $("#qFill",el).style.width = Math.round((S.qcm.done.length/COURSE.qcm.length)*100) + "%";
    if(S.qcm.correct.length === COURSE.qcm.length) celebrate();
  }

  $("#qReset", el).addEventListener("click", ()=>{ S.qcm.done=[];S.qcm.correct=[];S.qcm.wrong=[];pos=0;save();renderQ(); });
  $("#qOnlyWrong", el).addEventListener("click", ()=>{ S.qcm.onlyWrong = !S.qcm.onlyWrong; save(); pos=0; renderMain(); });
  renderQ();
  return el;
}

  `));

  const stats = html(`
    <div class="panel p-3">
      <div class="flex items-center justify-between text-xs text-[color:var(--muted)] mb-1.5">
        <span>Question <b id="lPos">1</b> / ${COURSE.libre.length}</span>
        <span>Validés <b id="lOk">0</b> · Partiels <b id="lPart">0</b></span>
      </div>
      <div class="h-2 progress-track"><div id="lFill" class="progress-fill" style="width:0%"></div></div>
    </div>
  `);
  el.appendChild(stats);

  let pos = 0;
  const box = html(`<div id="lBox" class="panel p-5 md:p-6 space-y-4"></div>`);
  el.appendChild(box);

  function counters(){
    let ok=0,part=0;
    Object.values(S.libre.scores).forEach(s=>{ if(s==="ok") ok++; else if(s==="part") part++; });
    $("#lOk",el).textContent = ok;
    $("#lPart",el).textContent = part;
    $("#lFill",el).style.width = Math.round((S.libre.done.length/COURSE.libre.length)*100) + "%";
  }

  function renderQ(){
    const it = COURSE.libre[pos];
    $("#lPos",el).textContent = pos+1;
    counters();
    box.innerHTML = `
      <h3 class="font-bold text-lg md:text-xl">${it.q}</h3>
      <textarea id="lInput" rows="4" placeholder="Réponds avec tes propres mots…" class="w-full panel-2 p-4 rounded-xl outline-none focus:ring-2 ring-[color:#7c5cff] text-base"></textarea>
      <div class="flex flex-wrap gap-2">
        <button class="btn btn-primary" id="lCheck">Vérifier</button>
        <button class="btn" id="lSkip">Voir la réponse</button>
        <button class="btn" id="lPrev">Précédent</button>
        <button class="btn" id="lNext">Suivant ${ic("cards",14)}</button>
      </div>
      <div id="lFb" class="hidden panel-2 p-4 text-sm leading-relaxed"></div>
    `;
    $("#lCheck", box).addEventListener("click", ()=>{
      const val = normalize($("#lInput",box).value);
      if(!val){ shake(box); return; }
      const found = it.kw.filter(k=> val.includes(normalize(k))).length;
      let status = "wrong", title = "✗ À retravailler", color="text-[#f87171]";
      if(found >= it.min){ status="ok"; title="✓ Validé"; color="text-[#34d399]"; }
      else if(found >= Math.max(1, it.min-1)){ status="part"; title="≈ Partiel — bon début"; color="text-[#facc15]"; }
      if(!S.libre.done.includes(pos)) S.libre.done.push(pos);
      S.libre.scores[pos] = status;
      save(); bumpStreak();
      const fb = $("#lFb", box);
      fb.classList.remove("hidden");
      fb.innerHTML = `
        <div class="font-bold mb-1 ${color}">${title} · mots-clés trouvés ${found}/${it.kw.length} (min ${it.min})</div>
        <div class="text-[color:var(--soft)]"><b>Réponse modèle :</b> ${it.ideal}</div>
        <div class="text-[color:var(--muted)] text-xs mt-1">Mots-clés attendus : ${it.kw.map(k=>`<code class="mono px-1.5 py-0.5 rounded bg-[color:var(--panel)]">${k}</code>`).join(" ")}</div>`;
      counters();
    });
    $("#lSkip", box).addEventListener("click", ()=>{
      const fb = $("#lFb", box);
      fb.classList.remove("hidden");
      fb.innerHTML = `<div class="font-bold mb-1 text-[color:#22d3ee]">Réponse modèle</div><div class="text-[color:var(--soft)]">${it.ideal}</div>`;
    });
    $("#lNext", box).addEventListener("click", ()=>{ pos = Math.min(pos+1, COURSE.libre.length-1); renderQ(); });
    $("#lPrev", box).addEventListener("click", ()=>{ pos = Math.max(0, pos-1); renderQ(); });
  }

  $("#lReset", el).addEventListener("click", ()=>{ S.libre={done:[],scores:{}}; pos=0; save(); renderQ(); });
  renderQ();
  return el;
}

/* ===================== VIEW: MIND MAP ===================== */
function viewMind(){
  S.progress.mind = true; save();
  const el = html(`<section class="space-y-4"></section>`);
  el.appendChild(html(`<div><h2 class="text-2xl font-extrabold">Carte mentale</h2><p class="text-[color:var(--muted)] text-sm">Clique sur un nœud pour en lire le détail.</p></div>`));

  const box = html(`<div class="panel p-3"></div>`);
  el.appendChild(box);

  const W = 720, H = 520, cx=W/2, cy=H/2;
  const nodes = COURSE.mindmap.nodes;
  const N = nodes.length;
  const R = 200;
  const pts = nodes.map((n,i)=>{
    const a = (i/N) * Math.PI*2 - Math.PI/2;
    return { ...n, x: cx + Math.cos(a)*R, y: cy + Math.sin(a)*R };
  });

  const svgNS = "http://www.w3.org/2000/svg";
  const svg = document.createElementNS(svgNS, "svg");
  svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
  svg.setAttribute("class", "mm-svg w-full h-auto");
  svg.setAttribute("role","img");
  svg.setAttribute("aria-label","Carte mentale Séquence 23");

  svg.innerHTML = `
    <defs>
      <linearGradient id="mmgrad" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#7c5cff"/>
        <stop offset="50%" stop-color="#22d3ee"/>
        <stop offset="100%" stop-color="#34d399"/>
      </linearGradient>
      <radialGradient id="mmcenter" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#22d3ee"/>
        <stop offset="100%" stop-color="#7c5cff"/>
      </radialGradient>
    </defs>
  `;

  pts.forEach(p=>{
    const line = document.createElementNS(svgNS,"path");
    line.setAttribute("class","edge");
    line.setAttribute("d", `M ${cx} ${cy} Q ${(cx+p.x)/2} ${(cy+p.y)/2 - 40} ${p.x} ${p.y}`);
    line.setAttribute("fill","none");
    svg.appendChild(line);
  });

  // Center
  const cg = document.createElementNS(svgNS, "g");
  cg.setAttribute("class","node");
  cg.dataset.id = "c";
  const ccir = document.createElementNS(svgNS, "circle");
  ccir.setAttribute("cx", cx); ccir.setAttribute("cy", cy);
  ccir.setAttribute("r", 56);
  ccir.setAttribute("fill", "url(#mmcenter)");
  ccir.setAttribute("class","node-circle");
  cg.appendChild(ccir);
  const ctext = document.createElementNS(svgNS, "text");
  ctext.setAttribute("x", cx); ctext.setAttribute("y", cy+4);
  ctext.setAttribute("text-anchor","middle");
  ctext.setAttribute("font-size","16");
  ctext.setAttribute("fill","#0b0f1a");
  ctext.setAttribute("font-weight","800");
  ctext.textContent = "Séq. 23";
  cg.appendChild(ctext);
  svg.appendChild(cg);
  cg.addEventListener("click", ()=> openModal(COURSE.mindmap.center.label, COURSE.mindmap.center.desc));

  // External nodes
  pts.forEach(p=>{
    const g = document.createElementNS(svgNS, "g");
    g.setAttribute("class","node");
    g.dataset.id = p.id;
    const c = document.createElementNS(svgNS, "circle");
    c.setAttribute("cx", p.x); c.setAttribute("cy", p.y);
    c.setAttribute("r", 46);
    c.setAttribute("fill", p.color);
    c.setAttribute("class","node-circle");
    g.appendChild(c);
    // wrap text on 2 lines
    const t = document.createElementNS(svgNS, "text");
    t.setAttribute("x", p.x);
    t.setAttribute("y", p.y);
    t.setAttribute("text-anchor","middle");
    t.setAttribute("font-size","12");
    t.setAttribute("fill","#0b0f1a");
    t.setAttribute("font-weight","800");
    const words = p.label.split(" ");
    if(words.length>1){
      const a = document.createElementNS(svgNS,"tspan"); a.setAttribute("x",p.x); a.setAttribute("dy","-2"); a.textContent = words.slice(0, Math.ceil(words.length/2)).join(" ");
      const b = document.createElementNS(svgNS,"tspan"); b.setAttribute("x",p.x); b.setAttribute("dy","14"); b.textContent = words.slice(Math.ceil(words.length/2)).join(" ");
      t.appendChild(a); t.appendChild(b);
    } else { t.textContent = p.label; t.setAttribute("dy","4"); }
    g.appendChild(t);
    svg.appendChild(g);
    g.addEventListener("click", ()=> openModal(p.label, p.desc));
  });

  box.appendChild(svg);

  // Legend / quick list
  const legend = html(`<div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-3"></div>`);
  [{...COURSE.mindmap.center, color:"#22d3ee"}, ...nodes].forEach(n=>{
    legend.appendChild(html(`
      <button class="panel-2 p-4 text-left card-hover flex gap-3 items-start" data-mm="${n.id}">
        <div class="w-3 h-3 rounded-full mt-1.5" style="background:${n.color||'#7c5cff'}"></div>
        <div><div class="font-bold">${n.label}</div><div class="text-sm text-[color:var(--soft)] mt-0.5">${n.desc}</div></div>
      </button>
    `));
  });
  el.appendChild(legend);
  legend.addEventListener("click", e=>{
    const b = e.target.closest("[data-mm]"); if(!b) return;
    const id = b.dataset.mm;
    const n = id==="c" ? COURSE.mindmap.center : nodes.find(x=>x.id===id);
    openModal(n.label, n.desc);
  });

  return el;
}

/* ===================== VIEW: EXAM ===================== */
function viewExam(){
  const el = html(`<section class="space-y-4"></section>`);
  el.appendChild(html(`
    <div class="flex items-center justify-between flex-wrap gap-3">
      <div>
        <h2 class="text-2xl font-extrabold">Mode examen</h2>
        <p class="text-[color:var(--muted)] text-sm">10 questions mixées · 8 min chrono · note sur 20 avec axes d'amélioration.</p>
      </div>
      <div class="flex gap-2">
        <span class="chip">Meilleur · <b>${(S.exam.best||0).toFixed(1)}/20</b></span>
        <span class="chip">Dernier · <b>${(S.exam.last||0).toFixed(1)}/20</b></span>
      </div>
    </div>
  `));

  const launch = html(`
    <div class="panel p-6 ring-grad relative">
      <div class="flex flex-col md:flex-row md:items-center gap-4">
        <div class="flex-1">
          <h3 class="font-bold text-lg">Prêt(e) ?</h3>
          <p class="text-[color:var(--soft)] text-sm">Mélange de QCM et réponses courtes. Pas de retour en arrière. À la fin : note /20 + feedback ciblé.</p>
        </div>
        <button class="btn btn-primary pulse" id="examStart">Démarrer l'examen ${ic("timer",16)}</button>
      </div>
    </div>
  `);
  el.appendChild(launch);

  const box = html(`<div id="examBox"></div>`);
  el.appendChild(box);

  function buildExam(){
    // 7 QCM + 3 réponses courtes
    const qcm = [...COURSE.qcm].sort(()=>Math.random()-0.5).slice(0,7).map(q=>({type:"qcm", ...q}));
    const libre = [...COURSE.libre].sort(()=>Math.random()-0.5).slice(0,3).map(q=>({type:"libre", ...q}));
    return [...qcm, ...libre].sort(()=>Math.random()-0.5);
  }
  let questions = [];
  let idx = 0;
  let answers = [];
  let timer = null;
  let remaining = 8*60;

  $("#examStart", launch).addEventListener("click", ()=>{
    questions = buildExam();
    idx = 0; answers = [];
    remaining = 8*60;
    launch.classList.add("hidden");
    startTimer();
    renderEx();
  });

  function startTimer(){
    clearInterval(timer);
    timer = setInterval(()=>{
      remaining--;
      const t = $("#exTime", el);
      if(t) t.textContent = fmt(remaining);
      if(remaining<=0){ clearInterval(timer); finish(); }
    },1000);
  }
  function fmt(s){ const m=Math.floor(s/60), x=s%60; return `${m}:${String(x).padStart(2,'0')}`; }

  function renderEx(){
    const q = questions[idx];
    const pct = Math.round(((idx)/questions.length)*100);
    box.innerHTML = `
      <div class="panel p-3 mb-3">
        <div class="flex items-center justify-between text-xs text-[color:var(--muted)] mb-1.5">
          <span>Question <b>${idx+1}</b> / ${questions.length}</span>
          <span>Temps : <b id="exTime">${fmt(remaining)}</b></span>
        </div>
        <div class="h-2 progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="panel p-5 md:p-6 space-y-4">
        <div class="flex items-center gap-2 text-xs">
          <span class="chip">${q.type==="qcm"?"QCM":"Réponse courte"}</span>
        </div>
        <h3 class="font-bold text-lg md:text-xl">${q.q}</h3>
        ${q.type==="qcm" ? `
          <div class="grid gap-2" id="exOpts">
            ${q.o.map((opt,k)=>`<button class="opt" data-k="${k}"><span class="dot">${String.fromCharCode(65+k)}</span><span class="flex-1">${opt}</span></button>`).join("")}
          </div>
        ` : `
          <textarea id="exInput" rows="3" placeholder="Réponse courte…" class="w-full panel-2 p-4 rounded-xl outline-none focus:ring-2 ring-[color:#7c5cff] text-base"></textarea>
        `}
        <div class="flex justify-end gap-2">
          <button class="btn btn-primary" id="exNext">${idx===questions.length-1?"Terminer":"Suivant"} ${ic("cards",14)}</button>
        </div>
      </div>
    `;
    if(q.type==="qcm"){
      let chosen = null;
      $$("#exOpts .opt", box).forEach(b=>{
        b.addEventListener("click", ()=>{
          $$("#exOpts .opt", box).forEach(x=>{ x.classList.remove("correct","wrong"); x.querySelector(".dot").style.background=""; });
          chosen = +b.dataset.k;
          b.style.borderColor = "#7c5cff";
        });
      });
      $("#exNext", box).addEventListener("click", ()=>{
        answers.push({q, type:"qcm", chosen});
        next();
      });
    } else {
      $("#exNext", box).addEventListener("click", ()=>{
        const v = $("#exInput", box).value;
        answers.push({q, type:"libre", val:v});
        next();
      });
    }
  }
  function next(){
    if(idx < questions.length-1){ idx++; renderEx(); }
    else finish();
  }
  function finish(){
    clearInterval(timer);
    // Scoring
    let raw = 0, max = 0, perCat = {qcm:{ok:0,n:0}, libre:{ok:0,part:0,n:0}};
    const details = [];
    answers.forEach(a=>{
      if(a.type==="qcm"){
        max += 1; perCat.qcm.n++;
        const ok = a.chosen === a.q.c;
        if(ok){ raw += 1; perCat.qcm.ok++; }
        details.push({ok: ok?"ok":"wrong", q:a.q.q, expected:a.q.o[a.q.c], got: a.chosen==null?"—":a.q.o[a.chosen], explain:a.q.e});
      } else {
        max += 1; perCat.libre.n++;
        const val = normalize(a.val||"");
        const found = a.q.kw.filter(k=>val.includes(normalize(k))).length;
        let s = 0, st="wrong";
        if(found >= a.q.min){ s = 1; st="ok"; perCat.libre.ok++; }
        else if(found >= Math.max(1, a.q.min-1)){ s = 0.5; st="part"; perCat.libre.part++; }
        raw += s;
        details.push({ok:st, q:a.q.q, expected:a.q.ideal, got:a.val||"—", explain:"Mots-clés trouvés : "+found+" / "+a.q.kw.length+" (min "+a.q.min+")"});
      }
    });
    const note = (raw/max)*20;
    S.exam.last = note;
    if(note > (S.exam.best||0)) S.exam.best = note;
    S.exam.history.push({date: new Date().toISOString(), note});
    save(); bumpStreak();
    if(note >= 16) celebrate();

    // Build axes
    const axes = [];
    if(perCat.qcm.ok < perCat.qcm.n) axes.push("Revoir les QCM ratés (mode « erreurs uniquement »).");
    if(perCat.libre.ok < perCat.libre.n) axes.push("Travailler la formulation libre : reformule avec les mots-clés exacts du cours.");
    if(note < 12) axes.push("Relire la synthèse complète et refaire les flashcards en priorité.");
    if(note >= 12 && note < 16) axes.push("Insister sur les pièges (coopératif/collaboratif, addition/enlèvement) + chaîne CAO.");
    if(note >= 16) axes.push("Excellent — entraîne-toi avec les questions de niveau 3 et les verbes : justifier, comparer.");

    box.innerHTML = `
      <div class="panel p-6 md:p-8 text-center ring-grad">
        <div class="text-xs uppercase tracking-widest text-[color:var(--muted)]">Résultat</div>
        <div class="text-6xl md:text-7xl font-extrabold grad-text mt-1">${note.toFixed(1)}<span class="text-3xl text-[color:var(--muted)]">/20</span></div>
        <div class="mt-2 text-[color:var(--soft)]">${note>=16?"🏆 Excellent !":note>=12?"👍 Bien joué — peaufine quelques points.":note>=8?"💪 Persévère, c'est presque ça.":"📚 Reprends les bases, tu peux y arriver."}</div>
        <div class="mt-4 flex justify-center gap-2 flex-wrap">
          <span class="chip">QCM ${perCat.qcm.ok}/${perCat.qcm.n}</span>
          <span class="chip">Libre ${perCat.libre.ok}/${perCat.libre.n} (+${perCat.libre.part} partiels)</span>
        </div>
      </div>
      <div class="panel p-5 mt-3">
        <h4 class="font-bold mb-2">Axes d'amélioration</h4>
        <ul class="space-y-2 text-sm text-[color:var(--soft)]">${axes.map(a=>`<li class="flex gap-2"><span class="text-[color:#facc15]">➜</span><span>${a}</span></li>`).join("")}</ul>
      </div>
      <div class="panel p-5 mt-3 space-y-3">
        <h4 class="font-bold">Détail des questions</h4>
        ${details.map(d=>`
          <div class="panel-2 p-4">
            <div class="text-xs ${d.ok==='ok'?'text-[#34d399]':d.ok==='part'?'text-[#facc15]':'text-[#f87171]'} font-bold uppercase mb-1">${d.ok==='ok'?'✓ Correct':d.ok==='part'?'≈ Partiel':'✗ Incorrect'}</div>
            <div class="font-semibold mb-1">${d.q}</div>
            <div class="text-sm text-[color:var(--soft)]"><b>Ta réponse :</b> ${d.got}</div>
            <div class="text-sm text-[color:var(--soft)]"><b>Attendu :</b> ${d.expected}</div>
            <div class="text-xs text-[color:var(--muted)] mt-1">${d.explain}</div>
          </div>
        `).join("")}
      </div>
      <div class="flex gap-2 mt-3"><button class="btn btn-primary" id="exRestart">Recommencer un examen ${ic("timer",16)}</button></div>
    `;
    $("#exRestart", box).addEventListener("click", ()=>{ S.tab="exam"; save(); renderMain(); });
  }

  return el;
}

/* =====================================================================
   KEYWORDS POPUP
===================================================================== */
function attachKeywords(root){
  $$(".kw", root).forEach(el=>{
    el.addEventListener("click", ()=>{
      const key = el.dataset.kw;
      const def = findDef(key);
      if(def) openModal(prettyKey(key), def);
    });
  });
}
function prettyKey(k){
  // Match original casing in COURSE.keywords
  const orig = Object.keys(COURSE.keywords).find(x=>x.toLowerCase()===k.toLowerCase());
  return orig || k;
}
function findDef(k){
  const orig = Object.keys(COURSE.keywords).find(x=>x.toLowerCase()===k.toLowerCase());
  return orig ? COURSE.keywords[orig] : null;
}
function openModal(title, body){
  $("#modalTitle").textContent = title;
  $("#modalBody").innerHTML = body;
  $("#modal").classList.add("open");
}
$("#modalClose")?.addEventListener("click", ()=> $("#modal").classList.remove("open"));
$("#modal")?.addEventListener("click", (e)=>{ if(e.target.id==="modal") $("#modal").classList.remove("open"); });
document.addEventListener("keydown", e=>{ if(e.key==="Escape") $("#modal").classList.remove("open"); });

===================================================================== */
function applyTheme(){
  document.documentElement.setAttribute("data-theme", S.theme);
  $("#iconMoon").classList.toggle("hidden", S.theme==="light");
  $("#iconSun").classList.toggle("hidden", S.theme!=="light");
}
$("#themeToggle").addEventListener("click", ()=>{ S.theme = S.theme==="dark"?"light":"dark"; save(); applyTheme(); });

===================================================================== */
$("#resetBtn").addEventListener("click", ()=>{
  if(!confirm("Réinitialiser toute la progression ?")) return;
  S = structuredClone(defaultState); save();
  renderTabs(); renderMain(); applyTheme();
});

/* =====================================================================
   CELEBRATION
===================================================================== */
function celebrate(){
  const colors = ["#7c5cff","#22d3ee","#34d399","#facc15","#f472b6"];
  for(let i=0;i<60;i++){
    const c = document.createElement("div");
    c.className = "confetti";
    c.style.left = Math.random()*100 + "vw";
    c.style.background = colors[i%colors.length];
    c.style.animation = `fall ${1.5+Math.random()*1.5}s ${Math.random()*0.4}s linear forwards`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(), 3500);
  }
}
const styleConfetti = document.createElement("style");
styleConfetti.textContent = `@keyframes fall{ to{ transform: translateY(110vh) rotate(720deg); opacity:0; } }`;
document.head.appendChild(styleConfetti);

function shake(el){ el.classList.add("shake"); setTimeout(()=>el.classList.remove("shake"),350); }

/* =====================================================================
   INIT
===================================================================== */
applyTheme();
renderTabs();
renderMain();
$("#streakNum").textContent = S.streak.count;
updateGlobalProgress();
</script>
</body>
